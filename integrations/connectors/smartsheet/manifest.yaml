id: "smartsheet"
version: "1.0.0"
name: "Smartsheet"
description: "Sync schedules and sheets from Smartsheet."
owner: "integration-team"
category: "pm"
auth:
  type: "api_token"
  fields:
    - "api_token"
    - "base_url"
sync:
  modes:
    - "full"
    - "incremental"
  default_schedule: "*/30 * * * *"
  supports_webhooks: false
  rate_limit_per_minute: 60
mappings:
  - source: "project"
    target: "project"
    mapping_file: "mappings/project.yaml"
