id: "workday_mcp"
version: "1.0.0"
name: "Workday (MCP)"
description: "Sync Workday HRIS data via MCP services."
owner: "integration-team"
category: "hris"
protocol: "mcp"
auth:
  type: "api_key"
  fields:
    - "mcp_server_url"
    - "mcp_server_id"
    - "tool_map"
    - "mcp_api_key"
    - "mcp_api_key_header"
mcp:
  server_url: "https://mcp.example.com"
  server_id: "workday"
  protocol_version: "2025-06-18"
  tool_map:
    list_workers: "workday.listWorkers"
    list_job_profiles: "workday.listJobProfiles"
    list_positions: "workday.listPositions"
    list_organizations: "workday.listOrganizations"
mcp_server_url: "https://mcp.example.com"
mcp_server_id: "workday"
tool_map:
  list_workers: "workday.listWorkers"
  list_job_profiles: "workday.listJobProfiles"
  list_positions: "workday.listPositions"
  list_organizations: "workday.listOrganizations"
sync:
  modes:
    - "full"
    - "incremental"
  default_schedule: "0 */8 * * *"
  supports_webhooks: false
  rate_limit_per_minute: 300
mappings:
  - source: "project"
    target: "project"
    mapping_file: "mappings/project.yaml"
  - source: "resource"
    target: "resource"
    mapping_file: "mappings/resource.yaml"
