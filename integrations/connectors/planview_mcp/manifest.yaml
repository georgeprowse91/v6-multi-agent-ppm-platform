id: "planview_mcp"
version: "1.0.0"
name: "Planview (MCP)"
description: "Sync portfolio and project data from Planview via an MCP server."
owner: "integration-team"
category: "ppm"
auth:
  type: "mcp"
  fields:
    - "mcp_server_url"
    - "mcp_server_id"
    - "mcp_tool_map"
mcp:
  server_url: "https://mcp.example.com"
  server_id: "planview"
  tool_map:
    list_projects: "planview.listProjects"
    create_project: "planview.createProject"
mcp_server_url: "https://mcp.example.com"
mcp_server_id: "planview"
mcp_tool_map:
  list_projects: "planview.listProjects"
  create_project: "planview.createProject"
sync:
  modes:
    - "full"
    - "incremental"
  default_schedule: "0 2 * * *"
  supports_webhooks: false
  rate_limit_per_minute: 200
mappings:
  - source: "project"
    target: "project"
    mapping_file: "../planview/mappings/project.yaml"
