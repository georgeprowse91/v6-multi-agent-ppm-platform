id: "clarity_mcp"
version: "1.0.0"
name: "Clarity PPM (MCP)"
description: "Sync Clarity projects and work items via an MCP server."
owner: "integration-team"
category: "ppm"
auth:
  type: "mcp"
  fields:
    - "mcp_server_url"
    - "mcp_server_id"
    - "mcp_tool_map"
mcp:
  server_url: "https://mcp.example.com"
  server_id: "clarity"
  tool_map:
    list_projects: "clarity.listProjects"
    create_project: "clarity.createProject"
mcp_server_url: "https://mcp.example.com"
mcp_server_id: "clarity"
mcp_tool_map:
  list_projects: "clarity.listProjects"
  create_project: "clarity.createProject"
sync:
  modes:
    - "full"
    - "incremental"
  default_schedule: "0 3 * * *"
  supports_webhooks: false
  rate_limit_per_minute: 200
mappings:
  - source: "project"
    target: "project"
    mapping_file: "../clarity/mappings/project.yaml"
