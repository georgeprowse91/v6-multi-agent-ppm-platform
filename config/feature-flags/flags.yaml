flags:
  - name: schema_promotions
    enabled: true
    description: Allow schema promotion workflows in the data service.
  - name: mcp_global_enabled
    enabled: false
    description: Enable MCP routing globally (system/project overrides can narrow the rollout).
  - name: agent_run_tracking
    enabled: false
    description: Track agent runs and emit audit events for orchestration transitions.
  - name: agent_run_ui
    enabled: false
    description: Show the agent run monitoring UI in the web console.
  - name: multimodal_intake
    enabled: false
    description: Enable multimodal intake document uploads and extraction flows.
