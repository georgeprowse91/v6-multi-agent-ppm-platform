flags:
  - name: schema_promotions
    enabled: true
    description: Allow schema promotion workflows in the data service.
  - name: mcp_global_enabled
    enabled: false
    description: Enable MCP routing globally (system/project overrides can narrow the rollout).
  - name: agent_run_tracking
    enabled: false
    description: Track agent runs and emit audit events for orchestration transitions.
  - name: agent_run_ui
    enabled: false
    description: Show the agent run monitoring UI in the web console.
  - name: multimodal_intake
    enabled: false
    description: Enable multimodal intake document uploads and extraction flows.
  - name: canonical_propagation
    enabled: false
    description: Enforce canonical propagation rules and mapping validation for entity updates.
  - name: duplicate_resolution
    enabled: false
    description: Enable duplicate resolution review workflows and audit logging.
  - name: predictive_alerts
    enabled: false
    description: Enable predictive alert ingestion, notifications, and UI surfaces.
  - name: resource_optimization
    enabled: false
    description: Enable resource optimization workflows and UI surfaces.
