      - "document.coedit"
      - "marketplace.browse"
      - "marketplace.manage"
      - "marketplace.install"
  - id: "portfolio_admin"
    description: "Manage portfolios and projects."
    permissions:
      - "portfolio.read"
      - "portfolio.write"
      - "project.read"
      - "project.write"
      - "workflow.execute"
      - "workflow.read"
      - "config.read"
      - "config.write"
      - "connector.sync"
      - "document.coedit"
  - id: "project_manager"
    description: "Manage assigned projects and workflows."
    permissions:
      - "project.read"
      - "project.write"
      - "workflow.execute"
      - "workflow.read"
      - "config.read"
      - "config.write"
      - "document.coedit"
  - id: "COLLABORATOR"
    description: "Collaborate on shared documents with co-edit access."
    permissions:
      - "project.read"
      - "document.coedit"
  - id: "analyst"
    description: "Read-only analytics and portfolio visibility."
    permissions:
      - "portfolio.read"
