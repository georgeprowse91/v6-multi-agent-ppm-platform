      - "document.coedit"
      - "marketplace.browse"
      - "marketplace.manage"
      - "marketplace.install"
  - id: "PM"
    description: "Manage assigned projects and configuration."
    permissions:
      - "project.read"
      - "project.write"
      - "workflow.execute"
      - "workflow.read"
      - "config.read"
      - "config.write"
      - "document.coedit"
      - "marketplace.browse"
