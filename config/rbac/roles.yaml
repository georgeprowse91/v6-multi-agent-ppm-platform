      - "workflow.read"
      - "config.read"
  - id: "auditor"
    description: "Read audit events and compliance artifacts."
    permissions:
      - "audit.read"
      - "portfolio.read"
      - "project.read"
      - "config.read"
  - id: "integration_service"
    description: "Service account for connector sync automation."
    permissions:
      - "connector.sync"
      - "project.read"
      - "project.write"
      - "audit.write"
