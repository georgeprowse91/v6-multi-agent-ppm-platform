roles:
  - id: "PMO_ADMIN"
    description: "Owns tenant configuration and full access."
    permissions:
      - "portfolio.read"
      - "portfolio.write"
      - "project.read"
      - "project.write"
      - "workflow.execute"
      - "workflow.read"
      - "config.read"
      - "config.write"
      - "audit.read"
      - "audit.write"
      - "connector.sync"
