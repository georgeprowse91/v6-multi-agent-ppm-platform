roles:
  - id: portfolio_admin
    name: Portfolio Administrator
    description: Full access to all portfolio management functions
    permissions:
      - project.read
      - project.write
      - workflow.read
      - workflow.execute
      - audit.read
      - audit.write
      - config.read
      - config.write
      - document.coedit

  - id: project_manager
    name: Project Manager
    description: Manages individual projects and deliverables
    permissions:
      - project.read
      - project.write
      - workflow.read
      - workflow.execute
      - document.coedit

  - id: executive
    name: Executive
    description: Read-only access with financial visibility
    permissions:
      - project.read
      - workflow.read
      - audit.read

  - id: finance_manager
    name: Finance Manager
    description: Access to financial data and approval workflows
    permissions:
      - project.read
      - project.write
      - workflow.read
      - audit.read

  - id: analyst
    name: Analyst
    description: Read-only access without sensitive financial data
    permissions:
      - project.read
      - workflow.read

  - id: viewer
    name: Viewer
    description: Read-only access to non-sensitive data
    permissions:
      - project.read
