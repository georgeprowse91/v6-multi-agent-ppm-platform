version: 1
default_min_confidence: 0.6
fallback_intent: general_query

intents:
  - name: portfolio_query
    description: Query about portfolio status, health, or overview
    min_confidence: 0.6
    routes:
      - agent_id: portfolio-strategy-optimization
        action: query

  - name: financial_query
    description: Query about budgets, costs, financial variance, or ROI
    min_confidence: 0.6
    routes:
      - agent_id: financial-management
        action: query

  - name: schedule_query
    description: Query about timelines, deadlines, milestones, or critical path
    min_confidence: 0.6
    routes:
      - agent_id: schedule-planning
        action: query

  - name: risk_query
    description: Query about project risks, issues, or mitigations
    min_confidence: 0.6
    routes:
      - agent_id: risk-management
        action: query

  - name: resource_query
    description: Query about resources, capacity, or team allocation
    min_confidence: 0.6
    routes:
      - agent_id: resource-capacity-planning
        action: query

  - name: compliance_query
    description: Query about compliance status, audits, or governance
    min_confidence: 0.6
    routes:
      - agent_id: compliance-regulatory
        action: query

  - name: general_query
    description: General or unclassified query
    min_confidence: 0.3
    routes:
      - agent_id: portfolio-strategy-optimization
        action: query
