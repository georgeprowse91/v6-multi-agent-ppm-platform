name: prod
region: eastus
endpoints:
  api_gateway: "keyvault://ppm-prod/endpoints/api_gateway"
  identity_access: "keyvault://ppm-prod/endpoints/identity_access"
  policy_engine: "keyvault://ppm-prod/endpoints/policy_engine"
  audit_log: "keyvault://ppm-prod/endpoints/audit_log"
  telemetry: "keyvault://ppm-prod/endpoints/telemetry"
  data_sync: "keyvault://ppm-prod/endpoints/data_sync"
  workflow_engine: "keyvault://ppm-prod/endpoints/workflow_engine"
  orchestration_service: "keyvault://ppm-prod/endpoints/orchestration_service"
  ui: "keyvault://ppm-prod/endpoints/ui"
vault:
  uri: "https://ppm-prod-kv.vault.azure.net/"
  secrets:
    identity_client_id: "keyvault://ppm-prod/identity/client-id"
    identity_client_secret: "keyvault://ppm-prod/identity/client-secret"
    service_bus_connection: "keyvault://ppm-prod/servicebus/connection"
    storage_account_key: "keyvault://ppm-prod/storage/account-key"
feature_flags:
  enable_workflow_engine: true
  enable_data_sync: true
  enable_connector_hub: true
  enable_audit_worm: true
  enable_otel_exporter: true
  enable_ui_identity: true
observability:
  otel_collector_endpoint: "keyvault://ppm-prod/observability/otel-collector"
  azure_monitor_connection: "keyvault://ppm-prod/observability/azure-monitor-connection"
  log_level: "INFO"
