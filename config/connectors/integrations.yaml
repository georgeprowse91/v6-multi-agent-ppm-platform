# Integration Connector Configurations
# See: docs/connectors/overview.md

# Project Management Systems
planview:
  enabled: false
  base_url: "${PLANVIEW_API_URL}"
  auth:
    type: "oauth2"
    token: "${PLANVIEW_API_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 30
    entities:
      - projects
      - resources
      - financials

jira:
  enabled: false
  base_url: "${JIRA_URL}"
  auth:
    type: "api_token"
    email: "${JIRA_EMAIL}"
    token: "${JIRA_API_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 15
    entities:
      - projects
      - issues
      - sprints
  field_mapping:
    project_key: "project.id"
    issue_key: "task.id"
    summary: "task.name"

azure_devops:
  enabled: false
  organization: "${AZURE_DEVOPS_ORG}"
  auth:
    type: "pat"
    token: "${AZURE_DEVOPS_PAT}"
  sync:
    enabled: true
    interval_minutes: 15

# Financial Systems
sap:
  enabled: false
  base_url: "${SAP_API_URL}"
  auth:
    type: "oauth2"
  entities:
    - projects
    - cost_centers
    - actual_costs

workday:
  enabled: false
  base_url: "${WORKDAY_API_URL}"
  auth:
    type: "oauth2"
    client_id: "${WORKDAY_CLIENT_ID}"
    client_secret: "${WORKDAY_CLIENT_SECRET}"
  entities:
    - workers
    - cost_centers
    - suppliers

# Collaboration Tools
slack:
  enabled: false
  auth:
    type: "bot_token"
    token: "${SLACK_BOT_TOKEN}"
  features:
    notifications: true
    commands: true
    interactive_messages: true

teams:
  enabled: false
  auth:
    type: "app_credentials"
    client_id: "${TEAMS_CLIENT_ID}"
    client_secret: "${TEAMS_CLIENT_SECRET}"
    tenant_id: "${TEAMS_TENANT_ID}"
  features:
    notifications: true
    cards: true

outlook:
  enabled: false
  base_url: "${OUTLOOK_API_URL}"
  auth:
    type: "oauth2"
    client_id: "${OUTLOOK_CLIENT_ID}"
    client_secret: "${OUTLOOK_CLIENT_SECRET}"
    refresh_token: "${OUTLOOK_REFRESH_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 30

google_calendar:
  enabled: false
  base_url: "${GOOGLE_CALENDAR_BASE_URL}"
  auth:
    type: "oauth2"
    client_id: "${GOOGLE_CALENDAR_CLIENT_ID}"
    client_secret: "${GOOGLE_CALENDAR_CLIENT_SECRET}"
    refresh_token: "${GOOGLE_CALENDAR_REFRESH_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 30

smartsheet:
  enabled: false
  base_url: "${SMARTSHEET_API_URL}"
  auth:
    type: "api_token"
    token: "${SMARTSHEET_API_TOKEN}"
  sync:
    enabled: true
    interval_minutes: 30

# Document Management
sharepoint:
  enabled: false
  site_url: "${SHAREPOINT_SITE_URL}"
  auth:
    type: "azure_ad"
  document_library: "Project Documents"

# CRM & Demand Systems
salesforce:
  enabled: false
  instance_url: "${SALESFORCE_INSTANCE_URL}"
  auth:
    type: "oauth2"
    client_id: "${SALESFORCE_CLIENT_ID}"
    client_secret: "${SALESFORCE_CLIENT_SECRET}"
  objects:
    - Opportunity
    - Case

# Communications & Notification Systems
azure_communication_services:
  enabled: false
  base_url: "${ACS_ENDPOINT}"
  auth:
    type: "api_key"
    connection_string: "${AZURE_COMMUNICATION_SERVICES_CONNECTION_STRING}"
    access_key: "${ACS_ACCESS_KEY}"
  features:
    sms: true
    email: true

twilio:
  enabled: false
  base_url: "${TWILIO_API_URL}"
  auth:
    type: "basic"
    account_sid: "${TWILIO_ACCOUNT_SID}"
    auth_token: "${TWILIO_AUTH_TOKEN}"
  features:
    sms: true

notification_hubs:
  enabled: false
  namespace: "${AZURE_NOTIFICATION_HUBS_NAMESPACE}"
  hub_name: "${AZURE_NOTIFICATION_HUBS_NAME}"
  auth:
    type: "sas"
    key_name: "${AZURE_NOTIFICATION_HUBS_SAS_KEY_NAME}"
    key: "${AZURE_NOTIFICATION_HUBS_SAS_KEY}"
  features:
    push: true

# General Integration Settings
integration_defaults:
  retry_policy:
    max_attempts: 3
    backoff_multiplier: 2
    initial_backoff_seconds: 2
  timeout_seconds: 30
  rate_limiting:
    enabled: true
    requests_per_minute: 60
  error_handling:
    log_errors: true
    alert_on_failure: true
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      timeout_seconds: 60
