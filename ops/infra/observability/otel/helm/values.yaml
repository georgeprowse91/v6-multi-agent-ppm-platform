replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.95.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4318

keyVault:
  enabled: true
  name: ""
  tenantId: ""
  clientId: ""
  secretName: "otel-collector-secrets"
  secrets:
    azureMonitorConnectionString: "azure-monitor-connection-string"

config:
  receivers:
    otlp:
      protocols:
        http:
        grpc:
  processors:
    batch:
  exporters:
    azuremonitor:
      connection_string: ${AZURE_MONITOR_CONNECTION_STRING}
    jaeger:
      endpoint: ${JAEGER_COLLECTOR_ENDPOINT}
      tls:
        insecure: true
    loki:
      endpoint: ${LOKI_ENDPOINT}
      tls:
        insecure: true
    prometheus:
      endpoint: 0.0.0.0:8889
      resource_to_telemetry_conversion:
        enabled: true
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [jaeger, azuremonitor]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus, azuremonitor]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [loki, azuremonitor]
