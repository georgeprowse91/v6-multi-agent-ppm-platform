apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: otel-collector-kv
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ required "keyVault.clientId is required for otel-collector" .Values.keyVault.clientId | quote }}
    keyvaultName: {{ required "keyVault.name is required for otel-collector" .Values.keyVault.name | quote }}
    tenantId: {{ required "keyVault.tenantId is required for otel-collector" .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.secrets.azureMonitorConnectionString | quote }}
          objectType: secret
  secretObjects:
    - secretName: {{ .Values.keyVault.secretName | quote }}
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.secrets.azureMonitorConnectionString | quote }}
          key: {{ .Values.keyVault.secrets.azureMonitorConnectionString | quote }}
