{{- if not .Values.keyVault.enabled }}
{{- fail "keyVault.enabled must be true for otel-collector" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      serviceAccountName: otel-collector-kv
      containers:
        - name: otel-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config=/conf/otel-collector-config.yaml"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: AZURE_MONITOR_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keyVault.secretName | quote }}
                  key: {{ .Values.keyVault.secrets.azureMonitorConnectionString | quote }}
          volumeMounts:
            - name: otel-config
              mountPath: /conf
            - name: keyvault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: otel-collector-kv
