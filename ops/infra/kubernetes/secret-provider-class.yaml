apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ppm-keyvault-secrets
  labels:
    app: ppm-api
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    useWorkloadIdentity: "true"
    clientID: "${KEY_VAULT_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: redis-url
          objectType: secret
        - |
          objectName: azure-openai-endpoint
          objectType: secret
        - |
          objectName: azure-openai-api-key
          objectType: secret
        - |
          objectName: identity-jwt-secret
          objectType: secret
        - |
          objectName: policy-engine-service-token
          objectType: secret
  secretObjects:
    - secretName: ppm-secrets
      type: Opaque
      data:
        - objectName: database-url
          key: database-url
        - objectName: redis-url
          key: redis-url
        - objectName: azure-openai-endpoint
          key: azure-openai-endpoint
        - objectName: azure-openai-api-key
          key: azure-openai-api-key
        - objectName: identity-jwt-secret
          key: identity-jwt-secret
        - objectName: policy-engine-service-token
          key: policy-engine-service-token
