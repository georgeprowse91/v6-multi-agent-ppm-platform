apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppm-api
  labels:
    app: ppm-api
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ppm-api
  template:
    metadata:
      labels:
        app: ppm-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ppm-keyvault-sa
      containers:
        - name: api
          image: ${CONTAINER_REGISTRY}/multi-agent-ppm:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ppm-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ppm-secrets
                  key: redis-url
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: ppm-secrets
                  key: azure-openai-endpoint
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ppm-secrets
                  key: azure-openai-api-key
            - name: IDENTITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ppm-secrets
                  key: identity-jwt-secret
            - name: POLICY_ENGINE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ppm-secrets
                  key: policy-engine-service-token
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: keyvault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ppm-keyvault-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ppm-api-service
  labels:
    app: ppm-api
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: ppm-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ppm-api-hpa
  labels:
    app: ppm-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ppm-api
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      # Conservative scale-down to prevent flapping
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      # Aggressive scale-up for quick response to load
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
# Pod Disruption Budget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ppm-api-pdb
  labels:
    app: ppm-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ppm-api
