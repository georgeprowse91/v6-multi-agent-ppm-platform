# Intent Router Agent Configuration
intent_router:
  agent_id: "intent-router-agent"
  enabled: true
  model:
    provider: "${INTENT_ROUTER_MODEL_PROVIDER}"
    deployment: "${INTENT_ROUTER_MODEL_DEPLOYMENT}"
    temperature: 0.3
    max_tokens: 500
  intents:
    - portfolio_query
    - project_create
    - schedule_query
    - financial_query
    - risk_query
    - resource_query
    - wbs_update
    - schedule_update
    - resource_update
    - risk_update
    - budget_update
    - demand_intake
    - compliance_query
    - analytics_query
  confidence_threshold: 0.7

# Response Orchestration Agent Configuration
response_orchestration:
  agent_id: "response-orchestration-agent"
  enabled: true
  max_concurrency: 5
  concurrency_limits:
    max_parallel_tasks: 4
    max_parallel_agents_per_intent: 3
  agent_timeout: 30  # seconds
  cache_ttl: 900  # 15 minutes
  retry_policy:
    max_attempts: 3
    backoff_multiplier: 2
    initial_backoff: 1  # seconds
  fallback_policy: "partial_return"  # fail_fast, partial_return, block
  gating:
    enabled: true
    min_confidence: 0.65
    block_on_agent_failure: false
  aggregation:
    provider: "${RESPONSE_ORCHESTRATION_MODEL_PROVIDER}"
    deployment: "${RESPONSE_ORCHESTRATION_MODEL_DEPLOYMENT}"
    max_tokens: 1000
