# Validation rules per entity type. Entity types use singular form.
# The agent normalises plural forms (e.g. "projects" -> "project") at lookup
# time so external systems can send either form.
default:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error

project:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error
  - field: status
    required: true
    severity: warning

task:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error
  - field: status
    required: true
    severity: warning
  - field: project_id
    required: true
    severity: error

resource:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error
  - field: role
    required: true
    severity: warning
  - field: email
    required: false
    severity: warning

vendor:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error

risk:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error
  - field: severity
    required: true
    severity: warning

test_case:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error
  - field: status
    required: true
    severity: warning

compliance_record:
  - field: id
    required: true
    severity: error
  - field: name
    required: true
    severity: error
  - field: status
    required: true
    severity: warning
