# Entity type schema registry. Entity types are registered in singular form.
# The agent normalises plural forms (e.g. "projects" -> "project") at lookup
# time so external systems can send either form.
entities:
  - name: project
    version: "1.0"
    schema:
      type: object
      required: [id, name, status]
      properties:
        id: {type: string}
        name: {type: string}
        status: {type: string}
        description: {type: string}
        start_date: {type: string}
        end_date: {type: string}
        owner_id: {type: string}
        budget: {type: number}
        updated_at: {type: string}
        created_at: {type: string}
  - name: task
    version: "1.0"
    schema:
      type: object
      required: [id, name, status, project_id]
      properties:
        id: {type: string}
        name: {type: string}
        status: {type: string}
        project_id: {type: string}
        assignee_id: {type: string}
        due_date: {type: string}
        priority: {type: string}
        updated_at: {type: string}
        created_at: {type: string}
  - name: resource
    version: "1.0"
    schema:
      type: object
      required: [id, name, role]
      properties:
        id: {type: string}
        name: {type: string}
        role: {type: string}
        email: {type: string}
        department: {type: string}
        status: {type: string}
        updated_at: {type: string}
        created_at: {type: string}
  - name: vendor
    version: "1.0"
    schema:
      type: object
      required: [id, name]
      properties:
        id: {type: string}
        name: {type: string}
        status: {type: string}
        category: {type: string}
        primary_contact: {type: string}
        updated_at: {type: string}
        created_at: {type: string}
  - name: risk
    version: "1.0"
    schema:
      type: object
      required: [id, name, severity]
      properties:
        id: {type: string}
        name: {type: string}
        severity: {type: string}
        status: {type: string}
        project_id: {type: string}
        mitigation_plan: {type: string}
        owner_id: {type: string}
        updated_at: {type: string}
        created_at: {type: string}
  - name: test_case
    version: "1.0"
    schema:
      type: object
      required: [id, name, status]
      properties:
        id: {type: string}
        name: {type: string}
        status: {type: string}
        suite_id: {type: string}
        priority: {type: string}
        requirement_id: {type: string}
        owner_id: {type: string}
        last_run_at: {type: string}
        updated_at: {type: string}
        created_at: {type: string}
  - name: compliance_record
    version: "1.0"
    schema:
      type: object
      required: [id, name, status]
      properties:
        id: {type: string}
        name: {type: string}
        status: {type: string}
        policy_id: {type: string}
        owner_id: {type: string}
        effective_date: {type: string}
        expiry_date: {type: string}
        risk_id: {type: string}
        updated_at: {type: string}
        created_at: {type: string}
