templates:
  - workflow_id: project-initiation
    apiVersion: ppm.workflow/v1
    kind: Workflow
    metadata:
      name: Project Initiation
      version: "1"
      owner: workflow-service
      description: Intake-to-charter workflow for new project requests.
    steps:
      - id: intake
        name: Capture intake
        type: task
        task_type: human
        initial: true
        next: triage
      - id: triage
        name: Triage request
        type: task
        task_type: automated
        retry:
          max_attempts: 2
          backoff_seconds: 30
        next: budget-decision
      - id: budget-decision
        name: Determine approval path
        type: decision
        branches:
          - name: exec-approval
            condition:
              field: "$.vars.budget"
              operator: greater_than
              value: 100000
            next: executive-approval
        default_next: sponsor-approval
      - id: executive-approval
        name: Executive approval
        type: approval
        next: sponsor-approval
      - id: sponsor-approval
        name: Sponsor approval
        type: approval
        next: charter
      - id: charter
        name: Draft charter
        type: task
        task_type: automated

  - workflow_id: change-request
    apiVersion: ppm.workflow/v1
    kind: Workflow
    metadata:
      name: Change Request Handling
      version: "1"
      owner: workflow-service
      description: Coordinate parallel impact reviews and CAB approval.
    steps:
      - id: log-request
        name: Log change request
        type: task
        task_type: human
        initial: true
        next: parallel-assessments
      - id: parallel-assessments
        name: Parallel impact assessments
        type: parallel
        branches:
          - name: risk
            next: risk-review
          - name: compliance
            next: compliance-review
      - id: risk-review
        name: Risk assessment
        type: task
        task_type: automated
        next: cab-approval
      - id: compliance-review
        name: Compliance review
        type: task
        task_type: automated
        next: cab-approval
      - id: cab-approval
        name: CAB approval
        type: approval
        next: implement-change
      - id: implement-change
        name: Implement change
        type: task
        task_type: automated
        retry:
          max_attempts: 3
          backoff_seconds: 60
