name: prod
region: eastus
endpoints:
  api_gateway: "file:/mnt/secrets-store/api-gateway-endpoint"
  identity_access: "file:/mnt/secrets-store/identity-access-endpoint"
  policy_engine: "file:/mnt/secrets-store/policy-engine-endpoint"
  audit_log: "file:/mnt/secrets-store/audit-log-endpoint"
  telemetry: "file:/mnt/secrets-store/telemetry-endpoint"
  data_sync: "file:/mnt/secrets-store/data-sync-endpoint"
  workflow_service: "file:/mnt/secrets-store/workflow-service-endpoint"
  orchestration_service: "file:/mnt/secrets-store/orchestration-service-endpoint"
  ui: "file:/mnt/secrets-store/ui-endpoint"
vault:
  uri: "https://ppm-prod-kv.vault.azure.net/"
  secrets:
    identity_client_id: "file:/mnt/secrets-store/identity-client-id"
    identity_client_secret: "file:/mnt/secrets-store/identity-client-secret"
    service_bus_connection: "file:/mnt/secrets-store/service-bus-connection"
    storage_account_key: "file:/mnt/secrets-store/storage-account-key"
    database_url: "file:/mnt/secrets-store/database-url"
    analytics_database_url: "file:/mnt/secrets-store/analytics-database-url"
    graph_api_tenant_id: "file:/mnt/secrets-store/graph-api-tenant-id"
    graph_api_client_id: "file:/mnt/secrets-store/graph-api-client-id"
    graph_api_client_secret: "file:/mnt/secrets-store/graph-api-client-secret"
    graph_api_base_url: "file:/mnt/secrets-store/graph-api-base-url"
    email_provider: "file:/mnt/secrets-store/email-provider"
    smtp_host: "file:/mnt/secrets-store/smtp-host"
    smtp_port: "file:/mnt/secrets-store/smtp-port"
    smtp_username: "file:/mnt/secrets-store/smtp-username"
    smtp_password: "file:/mnt/secrets-store/smtp-password"
    smtp_from_address: "file:/mnt/secrets-store/smtp-from-address"
    sendgrid_api_key: "file:/mnt/secrets-store/sendgrid-api-key"
    sendgrid_from_address: "file:/mnt/secrets-store/sendgrid-from-address"
feature_flags:
  enable_workflow_service: true
  enable_data_sync: true
  enable_connector_hub: true
  enable_audit_worm: true
  enable_otel_exporter: true
  enable_ui_identity: true
observability:
  otel_collector_endpoint: "file:/mnt/secrets-store/otel-collector-endpoint"
  azure_monitor_connection: "file:/mnt/secrets-store/azure-monitor-connection"
  log_level: "INFO"
connectors:
  jira:
    instance_url: "file:/mnt/secrets-store/jira-instance-url"
    email: "file:/mnt/secrets-store/jira-email"
    api_token: "file:/mnt/secrets-store/jira-api-token"
  servicenow:
    instance_url: "file:/mnt/secrets-store/servicenow-instance-url"
    token_url: "file:/mnt/secrets-store/servicenow-token-url"
    client_id: "file:/mnt/secrets-store/servicenow-client-id"
    client_secret: "file:/mnt/secrets-store/servicenow-client-secret"
    refresh_token: "file:/mnt/secrets-store/servicenow-refresh-token"
  azure_devops:
    organization_url: "file:/mnt/secrets-store/azure-devops-org-url"
    pat: "file:/mnt/secrets-store/azure-devops-pat"
databases:
  primary:
    connection_string: "file:/mnt/secrets-store/database-url"
  analytics:
    connection_string: "file:/mnt/secrets-store/analytics-database-url"
service_bus:
  connection_string: "file:/mnt/secrets-store/service-bus-connection"
  queue: "file:/mnt/secrets-store/service-bus-queue"
  topic: "file:/mnt/secrets-store/service-bus-topic"
graph_api:
  base_url: "file:/mnt/secrets-store/graph-api-base-url"
  tenant_id: "file:/mnt/secrets-store/graph-api-tenant-id"
  client_id: "file:/mnt/secrets-store/graph-api-client-id"
  client_secret: "file:/mnt/secrets-store/graph-api-client-secret"
email:
  provider: "file:/mnt/secrets-store/email-provider"
  smtp:
    host: "file:/mnt/secrets-store/smtp-host"
    port: "file:/mnt/secrets-store/smtp-port"
    username: "file:/mnt/secrets-store/smtp-username"
    password: "file:/mnt/secrets-store/smtp-password"
    from_address: "file:/mnt/secrets-store/smtp-from-address"
  sendgrid:
    api_key: "file:/mnt/secrets-store/sendgrid-api-key"
    from_address: "file:/mnt/secrets-store/sendgrid-from-address"
