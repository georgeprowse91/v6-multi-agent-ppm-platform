apiVersion: ppm.workflows/v1
kind: Workflow
metadata:
  name: Project Intake Workflow
  version: 2.0.0
  owner: PMO Office
  description: End-to-end intake and triage process for new project proposals, with automatic project creation on approval.
steps:
  - id: submit_intake
    type: task
    config:
      endpoint: /intake/submit
      form: project-intake
    next: strategic_alignment_check
  - id: strategic_alignment_check
    type: decision
    condition:
      field: payload.strategy_score
      operator: greater_than
      value: 70
    branches:
      - name: aligned
        condition:
          field: payload.strategy_score
          operator: greater_than
          value: 70
        next: pmo_triage
      - name: misaligned
        condition:
          field: payload.strategy_score
          operator: less_than
          value: 71
        next: reject_request
    default_next: reject_request
  - id: pmo_triage
    type: approval
    config:
      queue: pmo-intake
      required_role: PortfolioManager
    next: create_project
  - id: reject_request
    type: notification
    config:
      channel: notifications
      template: intake-rejected
    next: notify_requester
  - id: create_project
    type: task
    description: Auto-create project entity from approved intake request
    config:
      agent: approval_workflow
      action: record_decision
      post_approval_hook: create_project_entity
      endpoint: /api/project-setup/create-from-intake
    next: provision_workspace
  - id: provision_workspace
    type: task
    description: Initialise workspace via Workspace Setup agent
    config:
      agent: workspace_setup
      action: initialise_workspace
      endpoint: /api/project-setup/configure-workspace
      pass_project_id: true
    next: notify_requester
  - id: notify_requester
    type: notification
    config:
      channel: notifications
      template: intake-status
