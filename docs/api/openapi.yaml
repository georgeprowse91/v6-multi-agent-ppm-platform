openapi: 3.0.3
info:
  title: Multi-Agent PPM Platform API
  version: 0.1.0
  description: |
    OpenAPI specification for the Multi-Agent PPM Platform API gateway.
    This document covers the currently implemented endpoints in `services/api-gateway`.
servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.ppm.georgeprowse91.com
    description: Production base URL configured per deployment.
paths:
  /healthz:
    get:
      summary: Health probe
      responses:
        "200":
          description: Service is responding
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
  /version:
    get:
      summary: Service version metadata
      responses:
        "200":
          description: Version metadata for the API service
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: multi-agent-ppm-api
                  version:
                    type: string
                    example: 0.1.0
                  build_sha:
                    type: string
                    example: unknown
  /:
    get:
      summary: API root
      responses:
        "200":
          description: API metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRoot"
  /v1/status:
    get:
      summary: Platform status
      responses:
        "200":
          description: Platform status response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStatus"
  /v1/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Health check response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"
  /v1/health/ready:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Readiness response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessCheck"
  /v1/health/live:
    get:
      summary: Liveness check
      responses:
        "200":
          description: Liveness response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessCheck"
  /v1/query:
    post:
      summary: Process a natural language query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "503":
          description: Orchestrator not initialized
  /v1/agents:
    get:
      summary: List available agents
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
  /v1/agents/{agent_id}:
    get:
      summary: Get agent details
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetails"
        "404":
          description: Agent not found
  /v1/projects/{project_id}/scope/research:
    post:
      summary: Generate scope, requirements, and WBS proposals with external research
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScopeResearchRequest"
      responses:
        "200":
          description: Scope research response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopeResearchResponse"
        "503":
          description: Orchestrator not initialized
  /v1/projects/{project_id}/risks/research:
    post:
      summary: Research emerging risks with external sources
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskResearchRequest"
      responses:
        "200":
          description: Risk research response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskResearchResponse"
        "503":
          description: Orchestrator not initialized
  /v1/vendors/{vendor_id}/research:
    post:
      summary: Research a vendor using external sources
      parameters:
        - name: vendor_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorResearchRequest"
      responses:
        "200":
          description: Vendor research response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorResearchResponse"
        "503":
          description: Orchestrator not initialized
  /v1/projects/{project_id}/compliance/research:
    post:
      summary: Monitor regulatory updates with external sources
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceResearchRequest"
      responses:
        "200":
          description: Compliance research response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceResearchResponse"
        "503":
          description: Orchestrator not initialized
components:
  schemas:
    ApiRoot:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        status:
          type: string
        documentation:
          type: string
    PlatformStatus:
      type: object
      properties:
        status:
          type: string
        orchestrator_initialized:
          type: boolean
        agents_loaded:
          type: integer
    HealthCheck:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time
        service:
          type: string
    ReadinessCheck:
      type: object
      properties:
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            type: boolean
        timestamp:
          type: string
          format: date-time
    LivenessCheck:
      type: object
      properties:
        alive:
          type: boolean
        timestamp:
          type: string
          format: date-time
    ScopeResearchRequest:
      type: object
      required:
        - objective
      properties:
        objective:
          type: string
          description: High-level objective used for scope research.
        enable_external_research:
          type: boolean
          description: Override to enable or disable external research for this call.
        search_result_limit:
          type: integer
          minimum: 1
          maximum: 10
          description: Optional cap on external search results.
    ScopeResearchResponse:
      type: object
      properties:
        project_id:
          type: string
        objective:
          type: string
        scope:
          type: object
        requirements:
          type: array
          items:
            type: string
        wbs:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: string
        summary:
          type: string
        used_external_research:
          type: boolean
        notice:
          type: string
        requested_by:
          type: string
        generated_at:
          type: string
          format: date-time
        correlation_id:
          type: string
    RiskResearchRequest:
      type: object
      required:
        - context
      properties:
        context:
          type: string
          description: Project domain or context for external risk research.
        region:
          type: string
          description: Optional region for the project.
        categories:
          type: array
          items:
            type: string
          description: Optional list of high-level risk categories.
    RiskResearchResponse:
      type: object
      properties:
        project_id:
          type: string
        external_risks:
          type: array
          items:
            type: object
        added_risks:
          type: array
          items:
            type: object
        used_external_research:
          type: boolean
        notice:
          type: string
        correlation_id:
          type: string
    VendorResearchRequest:
      type: object
      required:
        - domain
      properties:
        domain:
          type: string
          description: Vendor domain or procurement category.
        vendor_name:
          type: string
          description: Optional vendor name override.
    VendorResearchResponse:
      type: object
      properties:
        vendor_id:
          type: string
        vendor_name:
          type: string
        summary:
          type: string
        insights:
          type: array
          items:
            type: object
        sources:
          type: array
          items:
            type: object
        used_external_research:
          type: boolean
        notice:
          type: string
        correlation_id:
          type: string
    ComplianceResearchRequest:
      type: object
      required:
        - domain
      properties:
        domain:
          type: string
          description: Project domain or industry for regulatory monitoring.
        region:
          type: string
          description: Optional region for regulatory monitoring.
    ComplianceResearchResponse:
      type: object
      properties:
        changes_detected:
          type: integer
        regulations_impacted:
          type: integer
        impacted_regulations:
          type: array
          items:
            type: object
        external_monitoring:
          type: object
        last_check:
          type: string
          format: date-time
    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Natural language query to route through the agent system.
        context:
          type: object
          additionalProperties: true
          description: Optional contextual data for the query.
    QueryResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true
        error:
          type: string
        metadata:
          type: object
          additionalProperties: true
    AgentList:
      type: object
      properties:
        total_agents:
          type: integer
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentSummary"
    AgentSummary:
      type: object
      properties:
        agent_id:
          type: string
        name:
          type: string
        capabilities:
          type: array
          items:
            type: string
    AgentDetails:
      type: object
      properties:
        agent_id:
          type: string
        capabilities:
          type: array
          items:
            type: string
        initialized:
          type: boolean
