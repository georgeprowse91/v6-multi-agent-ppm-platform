methodology: hybrid
version: "1.0"
stages:
  - id: initiation
    name: Initiation & Governance Setup
    purpose: Confirm the business case and establish hybrid governance.
    owner_roles:
      - Program Sponsor
      - Program Manager
    tasks:
      - id: business-case
        description: Validate investment case and funding.
        owner_roles:
          - Business Analyst
        artefacts:
          - name: Business case
            template: docs/templates/portfolio-program/business-case-var3-template-cross.md
            required: true
          - name: ROI/NPV worksheet
            template: docs/templates/finance/roi-npv-worksheet-cross.xlsx
            required: true
      - id: hybrid-charter
        description: Document hybrid charter, roles, and cadence.
        owner_roles:
          - Program Manager
        artefacts:
          - name: Hybrid charter
            template: docs/templates/governance/hybrid-charter-template-hybrid.md
            required: true
      - id: governance-pack
        description: Define stage gate and decision governance.
        owner_roles:
          - PMO Lead
        artefacts:
          - name: Governance pack
            template: docs/templates/governance/governance-pack-template-hybrid.md
            required: true
    exit_criteria:
      - Charter and governance pack approved.
    next_stage: planning
  - id: planning
    name: Planning & Mobilization
    purpose: Align milestones, risks, and delivery cadence.
    owner_roles:
      - Program Manager
      - Release Train Engineer
    tasks:
      - id: milestone-plan
        description: Establish milestones and stage gates with sprint ranges.
        owner_roles:
          - Program Scheduler
        artefacts:
          - name: Milestone plan
            template: docs/templates/schedule/milestone-plan-hybrid.xlsx
            required: true
      - id: integrated-risk
        description: Identify risks across sequential and iterative workstreams.
        owner_roles:
          - Risk Manager
        artefacts:
          - name: Integrated risk register
            template: docs/templates/risk/integrated-risk-register-hybrid.xlsx
            required: true
      - id: communications-plan
        description: Align stakeholder communication cadences.
        owner_roles:
          - Communications Lead
        artefacts:
          - name: Communications plan
            template: docs/templates/communications/communications-plan-template-cross.md
            required: true
          - name: Stakeholder register
            template: docs/templates/stakeholders/stakeholder-register-cross.xlsx
            required: true
    exit_criteria:
      - Milestones and risks reviewed by governance forum.
    next_stage: delivery
  - id: delivery
    name: Iterative Delivery
    purpose: Deliver increments while maintaining stage-gate control.
    owner_roles:
      - Delivery Lead
      - Scrum Master
    tasks:
      - id: sprint-plan
        description: Plan each iteration and confirm sprint commitments.
        owner_roles:
          - Scrum Master
        artefacts:
          - name: Sprint plan
            template: docs/templates/product/sprint-plan-template-agile.md
            required: true
      - id: change-control
        description: Manage scope changes and decision log updates.
        owner_roles:
          - Change Manager
        artefacts:
          - name: Change log
            template: docs/templates/change/change-log-template-cross.md
            required: true
          - name: Change impact assessment
            template: docs/templates/change/change-impact-assessment-template-cross.md
            required: true
    exit_criteria:
      - Increment accepted for integration.
    next_stage: integration
  - id: integration
    name: Integration & Release Readiness
    purpose: Validate integrated solution and readiness.
    owner_roles:
      - QA Lead
      - Release Manager
    tasks:
      - id: release-plan
        description: Validate release readiness and go-live criteria.
        owner_roles:
          - Release Manager
        artefacts:
          - name: Release plan
            template: docs/templates/schedule/release-plan-template-agile.md
            required: true
      - id: variance-report
        description: Summarize performance against milestones.
        owner_roles:
          - Program Manager
        artefacts:
          - name: Variance report
            template: docs/templates/finance/variance-report-template-cross.md
            required: true
    exit_criteria:
      - Release readiness checklist completed.
    next_stage: closure
  - id: closure
    name: Transition & Closure
    purpose: Formalize handover, lessons learned, and benefits tracking.
    owner_roles:
      - Program Manager
      - Operations Lead
    tasks:
      - id: closure-report
        description: Summarize outcomes, benefits, and transition plan.
        owner_roles:
          - Program Manager
        artefacts:
          - name: Closure report
            template: docs/templates/governance/closure-report-template-waterfall.md
            required: true
      - id: privacy-review
        description: Complete privacy and compliance documentation.
        owner_roles:
          - Compliance Officer
        artefacts:
          - name: DPIA report
            template: docs/compliance/privacy-dpia-template.md
            required: true
    exit_criteria:
      - Sponsor and operations sign-off.
    next_stage: null
