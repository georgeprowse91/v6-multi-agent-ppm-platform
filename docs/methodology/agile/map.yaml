methodology: agile
version: "1.0"
stages:
  - id: intake
    name: Intake & Discovery
    purpose: Validate demand, confirm outcomes, and seed an initial backlog.
    owner_roles:
      - Demand Manager
      - Product Owner
      - PMO Analyst
    tasks:
      - id: capture-demand
        description: Capture the request, objectives, and constraints for triage.
        owner_roles:
          - Demand Manager
        artefacts:
          - name: Demand intake request
            template: docs/templates/shared/demand-intake-request.md
            required: true
          - name: Demand intake schema
            template: docs/templates/shared/demand-intake-schema.yaml
            required: true
      - id: business-case
        description: Quantify value, cost, and options for approval.
        owner_roles:
          - Business Analyst
          - Finance Partner
        artefacts:
          - name: Business case
            template: docs/templates/shared/business-case.md
            required: true
          - name: ROI/NPV worksheet
            template: docs/templates/shared/roi-npv-worksheet.xlsx
            required: true
      - id: seed-backlog
        description: Create the initial backlog with epics, stories, and acceptance criteria.
        owner_roles:
          - Product Owner
        artefacts:
          - name: Product backlog
            template: docs/methodology/agile/templates/backlog.csv
            required: true
    exit_criteria:
      - Demand intake approved and assigned an owner.
      - Business case reviewed by sponsor.
      - Initial backlog contains prioritized epics and stories.
    next_stage: planning
  - id: planning
    name: Sprint & Release Planning
    purpose: Align the team on sprint goals, scope, capacity, and release targets.
    owner_roles:
      - Scrum Master
      - Product Owner
    tasks:
      - id: sprint-plan
        description: Define sprint goal, scope, and capacity commitments.
        owner_roles:
          - Scrum Master
        artefacts:
          - name: Sprint plan
            template: docs/methodology/agile/templates/sprint-plan.md
            required: true
      - id: release-plan
        description: Establish release scope, dependencies, and readiness criteria.
        owner_roles:
          - Product Owner
        artefacts:
          - name: Release plan
            template: docs/methodology/agile/templates/release-plan.md
            required: true
    exit_criteria:
      - Sprint plan approved by the delivery lead.
      - Release plan reviewed with stakeholders.
    next_stage: execution
  - id: execution
    name: Sprint Execution & Delivery
    purpose: Deliver committed backlog items and track progress and quality.
    owner_roles:
      - Delivery Team
      - Scrum Master
    tasks:
      - id: sprint-execution
        description: Execute stories, track progress, and remove blockers.
        owner_roles:
          - Delivery Team
        artefacts:
          - name: Burndown tracking
            template: docs/methodology/agile/templates/burndown.xlsx
            required: true
      - id: change-control
        description: Log scope changes and evaluate impacts.
        owner_roles:
          - Product Owner
        artefacts:
          - name: Change log
            template: docs/templates/shared/change-log.md
            required: true
          - name: Change impact assessment
            template: docs/templates/shared/change-impact-assessment.md
            required: true
    exit_criteria:
      - Sprint commitments completed or re-forecasted.
      - Change impacts reviewed and approved when needed.
    next_stage: review
  - id: review
    name: Review & Release Readiness
    purpose: Demonstrate outcomes and confirm release readiness.
    owner_roles:
      - Product Owner
      - QA Lead
    tasks:
      - id: sprint-review
        description: Conduct sprint review and validate acceptance criteria.
        owner_roles:
          - Product Owner
        artefacts:
          - name: Release readiness updates
            template: docs/methodology/agile/templates/release-plan.md
            required: true
      - id: variance-report
        description: Summarize delivery variance and corrective actions.
        owner_roles:
          - Delivery Lead
        artefacts:
          - name: Variance report
            template: docs/templates/shared/variance-report.md
            required: true
    exit_criteria:
      - Stakeholders accept delivered scope.
      - Release readiness checklist completed.
    next_stage: retrospective
  - id: retrospective
    name: Retrospective & Improvement
    purpose: Capture lessons learned and improvement actions.
    owner_roles:
      - Scrum Master
    tasks:
      - id: retro
        description: Facilitate the retrospective and capture commitments.
        owner_roles:
          - Scrum Master
        artefacts:
          - name: Retrospective notes
            template: docs/methodology/agile/templates/retro-notes.md
            required: true
    exit_criteria:
      - Improvement actions assigned and tracked.
    next_stage: planning
