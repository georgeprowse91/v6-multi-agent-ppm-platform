component_id: core-communication-plan--data-table
version: 1.0.0
kind: core-section
title: Data Table
interface:
  inputs:
  - name: project_name
    source_placeholder: '{{project_name}}'
    required: false
  - name: stakeholder_group
    source_placeholder: '{{stakeholder_group}}'
    required: false
  - name: communication_objective
    source_placeholder: '{{communication_objective}}'
    required: false
  - name: channel
    source_placeholder: '{{channel}}'
    required: false
  - name: cadence
    source_placeholder: '{{cadence}}'
    required: false
  - name: sender
    source_placeholder: '{{sender}}'
    required: false
  - name: escalation_path
    source_placeholder: '{{escalation_path}}'
    required: false
  - name: success_measure
    source_placeholder: '{{success_measure}}'
    required: false
