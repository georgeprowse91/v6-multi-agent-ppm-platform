component_id: core-product-backlog--data-table
version: 1.0.0
kind: core-section
title: Data Table
interface:
  inputs:
  - name: project_name
    source_placeholder: '{{project_name}}'
    required: false
  - name: backlog_item_id
    source_placeholder: '{{backlog_item_id}}'
    required: false
  - name: title
    source_placeholder: '{{title}}'
    required: false
  - name: description
    source_placeholder: '{{description}}'
    required: false
  - name: priority
    source_placeholder: '{{priority}}'
    required: false
  - name: estimate
    source_placeholder: '{{estimate}}'
    required: false
  - name: acceptance_criteria
    source_placeholder: '{{acceptance_criteria}}'
    required: false
  - name: dependencies
    source_placeholder: '{{dependencies}}'
    required: false
  - name: target_release
    source_placeholder: '{{target_release}}'
    required: false
  outputs:
  - name: data-table_section
    type: section
render:
  section:
    id: data-table
    title: Data Table
    type: table
    columns:
    - name: backlog-item-id
      type: string
    - name: title
      type: string
    - name: description
      type: string
    - name: priority
      type: string
    - name: estimate
      type: string
    - name: acceptance-criteria
      type: string
    - name: dependencies
      type: string
    - name: target-release
      type: string
    consumes_placeholders:
    - '{{project_name}}'
    - '{{backlog_item_id}}'
    - '{{title}}'
    - '{{description}}'
    - '{{priority}}'
    - '{{estimate}}'
    - '{{acceptance_criteria}}'
    - '{{dependencies}}'
    - '{{target_release}}'
