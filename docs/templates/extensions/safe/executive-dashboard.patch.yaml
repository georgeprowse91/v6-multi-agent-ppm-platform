metadata:
  template_id: safe-executive-dashboard-extension
  title: Safe Executive Dashboard Extension
  version: 1.0.0
  owner: PMO
  classification: extension
  methodology: safe
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - safe
  required: true
sections:
- id: pi-predictability
  title: Pi Predictability
  type: metric
- id: dependency-health
  title: Dependency Health
  type: metric
guidance:
  purpose: Patch overlay for executive-dashboard tailored to safe delivery.
  application: Apply this extension on top of the referenced core template to add methodology-specific content.
placeholders:
- key: pi_predictability
  token: '{{pi_predictability}}'
- key: dependency_health
  token: '{{dependency_health}}'
extends: core/executive-dashboard/manifest.yaml
add_tiles:
- pi-predictability
- dependency-health
