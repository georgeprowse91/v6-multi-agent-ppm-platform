metadata:
  template_id: safe-risk-register-extension
  title: SAFe Risk Register Extension
  version: 1.0.0
  owner: Lean Portfolio Management
  classification: extension
  methodology: safe
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - safe
  required: true
sections:
- id: roam-disposition
  title: ROAM Disposition
  type: table
  columns:
  - name: roam-category
    type: string
  - name: train-escalation-needed
    type: boolean
- id: program-increment-risk-view
  title: Program Increment Risk View
  type: narrative
guidance:
  purpose: Patch overlay for risk-register tailored to SAFe delivery.
  application: Apply this extension on top of the referenced core template to track PI-level risk handling and ROAM decisions.
placeholders:
- key: roam_category
  token: '{{roam_category}}'
- key: train_escalation_needed
  token: '{{train_escalation_needed}}'
- key: pi_risk_summary
  token: '{{pi_risk_summary}}'
extends: core/risk-register/manifest.yaml
add_fields:
- roam-category
- train-escalation-needed
add_sections:
- program-increment-risk-view
