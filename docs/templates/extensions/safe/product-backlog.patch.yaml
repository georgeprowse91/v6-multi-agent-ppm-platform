metadata:
  template_id: safe-product-backlog-extension
  title: Safe Product Backlog Extension
  version: 1.0.0
  owner: PMO
  classification: extension
  methodology: safe
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - safe
  required: true
sections:
- id: extension-fields
  title: Extension Fields
  type: table
  columns:
  - name: epic-feature-story-level
    type: string
  - name: program-increment
    type: string
guidance:
  purpose: Patch overlay for product-backlog tailored to safe delivery.
  application: Apply this extension on top of the referenced core template to add methodology-specific content.
placeholders:
- key: epic_feature_story_level
  token: '{{epic_feature_story_level}}'
- key: program_increment
  token: '{{program_increment}}'
extends: core/product-backlog/base.yaml
add_fields:
- epic-feature-story-level
- program-increment
