metadata:
  template_id: hybrid-project-charter-extension
  title: Hybrid Project Charter Extension
  version: 1.0.0
  owner: PMO
  classification: extension
  methodology: hybrid
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - hybrid
  required: true
sections:
- id: delivery-model-split
  title: Delivery Model Split
  type: narrative
- id: control-points
  title: Control Points
  type: narrative
guidance:
  purpose: Patch overlay for project-charter tailored to hybrid delivery.
  application: Apply this extension on top of the referenced core template to add methodology-specific content.
placeholders:
- key: delivery_model_split
  token: '{{delivery_model_split}}'
- key: control_points
  token: '{{control_points}}'
extends: core/project-charter/manifest.yaml
add_sections:
- delivery-model-split
- control-points
