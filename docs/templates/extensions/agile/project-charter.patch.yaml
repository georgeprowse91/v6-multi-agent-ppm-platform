metadata:
  template_id: agile-project-charter-extension
  title: Agile Project Charter Extension
  version: 1.0.0
  owner: PMO
  classification: extension
  methodology: agile
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - agile
  required: true
sections:
- id: product-vision
  title: Product Vision
  type: narrative
- id: release-strategy
  title: Release Strategy
  type: narrative
guidance:
  purpose: Patch overlay for project-charter tailored to agile delivery.
  application: Apply this extension on top of the referenced core template to add methodology-specific content.
placeholders:
- key: product_vision
  token: '{{product_vision}}'
- key: release_strategy
  token: '{{release_strategy}}'
extends: core/project-charter/base.yaml
add_sections:
- product-vision
- release-strategy
replace:
  governance: lightweight-roles-and-ceremonies
