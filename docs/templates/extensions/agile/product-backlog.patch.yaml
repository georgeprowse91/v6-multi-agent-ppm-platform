metadata:
  template_id: adaptive-product-backlog-extension
  title: Adaptive Product Backlog Extension
  version: 1.0.0
  owner: PMO
  classification: extension
  methodology: adaptive
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - adaptive
  required: true
sections:
- id: extension-fields
  title: Extension Fields
  type: table
  columns:
  - name: story-points
    type: string
  - name: sprint-candidate
    type: string
guidance:
  purpose: Patch overlay for product-backlog tailored to adaptive delivery.
  application: Apply this extension on top of the referenced core template to add methodology-specific content.
placeholders:
- key: story_points
  token: '{{story_points}}'
- key: sprint_candidate
  token: '{{sprint_candidate}}'
extends: core/product-backlog/manifest.yaml
add_fields:
- story-points
- sprint-candidate
