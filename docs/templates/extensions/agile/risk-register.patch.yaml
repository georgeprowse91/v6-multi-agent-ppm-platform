metadata:
  template_id: agile-risk-register-extension
  title: Agile Risk Register Extension
  version: 1.0.0
  owner: PMO
  classification: extension
  methodology: agile
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - agile
  required: true
sections:
- id: extension-fields
  title: Extension Fields
  type: table
  columns:
  - name: sprint-impact
    type: string
  - name: impediment-link
    type: string
guidance:
  purpose: Patch overlay for risk-register tailored to agile delivery.
  application: Apply this extension on top of the referenced core template to add methodology-specific content.
placeholders:
- key: sprint_impact
  token: '{{sprint_impact}}'
- key: impediment_link
  token: '{{impediment_link}}'
extends: core/risk-register/base.yaml
add_fields:
- sprint-impact
- impediment-link
