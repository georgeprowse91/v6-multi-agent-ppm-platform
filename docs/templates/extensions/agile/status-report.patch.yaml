metadata:
  template_id: adaptive-status-report-extension
  title: Adaptive Status Report Extension
  version: 1.0.0
  owner: PMO
  classification: extension
  methodology: adaptive
inputs:
- name: project_name
  type: string
  required: true
- name: methodology
  type: enum
  values:
  - adaptive
  required: true
sections:
- id: velocity-trend
  title: Velocity Trend
  type: narrative
- id: burnup-burndown
  title: Burnup Burndown
  type: narrative
guidance:
  purpose: Patch overlay for status-report tailored to adaptive delivery.
  application: Apply this extension on top of the referenced core template to add methodology-specific content.
placeholders:
- key: velocity_trend
  token: '{{velocity_trend}}'
- key: burnup_burndown
  token: '{{burnup_burndown}}'
extends: core/status-report/manifest.yaml
add_sections:
- velocity-trend
- burnup-burndown
