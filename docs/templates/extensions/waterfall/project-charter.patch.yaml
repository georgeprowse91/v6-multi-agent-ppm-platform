placeholders:
- key: phase_gate_criteria
  token: '{{phase_gate_criteria}}'
- key: procurement_summary
  token: '{{procurement_summary}}'
extends: core/project-charter/base.yaml
add_sections:
- phase-gate-criteria
- procurement-summary
