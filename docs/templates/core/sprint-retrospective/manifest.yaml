metadata:
  template_id: sprint-retrospective
  title: Sprint Retrospective
  version: 1.0.0
  status: active
  replaces: null
  replaced_by: null
  aliases:
  - sprint-retrospective-template.md
  owner: Product+Engineering
  classification: core
  composition_model: modular-v1
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
composition:
  order:
  - component_instance_id: core-sprint-retrospective--what-went-well
    ref: ../../components/core-sprint-retrospective--what-went-well.yaml
    bind:
      section_id: what-went-well
  - component_instance_id: core-sprint-retrospective--what-did-not-go-well
    ref: ../../components/core-sprint-retrospective--what-did-not-go-well.yaml
    bind:
      section_id: what-did-not-go-well
  - component_instance_id: core-sprint-retrospective--root-causes
    ref: ../../components/core-sprint-retrospective--root-causes.yaml
    bind:
      section_id: root-causes
  - component_instance_id: core-sprint-retrospective--experiments
    ref: ../../components/core-sprint-retrospective--experiments.yaml
    bind:
      section_id: experiments
  - component_instance_id: core-sprint-retrospective--owners-and-dates
    ref: ../../components/core-sprint-retrospective--owners-and-dates.yaml
    bind:
      section_id: owners-and-dates
guidance:
  purpose: Canonical base structure for the sprint-retrospective template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - what-went-well
- key: what_went_well
  token: '{{what_went_well}}'
  consumed_by_sections:
  - what-went-well
- key: what_did_not_go_well
  token: '{{what_did_not_go_well}}'
  consumed_by_sections:
  - what-did-not-go-well
- key: root_causes
  token: '{{root_causes}}'
  consumed_by_sections:
  - root-causes
- key: experiments
  token: '{{experiments}}'
  consumed_by_sections:
  - experiments
- key: owners_and_dates
  token: '{{owners_and_dates}}'
  consumed_by_sections:
  - owners-and-dates
