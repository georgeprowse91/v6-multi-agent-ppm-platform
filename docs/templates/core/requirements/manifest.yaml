metadata:
  template_id: requirements
  title: Requirements
  version: 1.0.0
  status: active
  replaces: null
  replaced_by: null
  aliases:
  - requirements_specification_template.md
  - business_requirements_document_template.md
  owner: PMO
  classification: core
  composition_model: modular-v1
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
composition:
  order:
  - component_instance_id: core-requirements--business-requirements
    ref: ../../components/core-requirements--business-requirements.yaml
    bind:
      section_id: business-requirements
  - component_instance_id: core-requirements--functional-requirements
    ref: ../../components/core-requirements--functional-requirements.yaml
    bind:
      section_id: functional-requirements
  - component_instance_id: core-requirements--non-functional-requirements
    ref: ../../components/core-requirements--non-functional-requirements.yaml
    bind:
      section_id: non-functional-requirements
  - component_instance_id: core-requirements--constraints
    ref: ../../components/core-requirements--constraints.yaml
    bind:
      section_id: constraints
  - component_instance_id: requirements--assumptions
    ref: ../../components/assumptions.yaml
    bind:
      section_id: assumptions
  - component_instance_id: core-requirements--traceability
    ref: ../../components/core-requirements--traceability.yaml
    bind:
      section_id: traceability
  - component_instance_id: core-requirements--acceptance-criteria
    ref: ../../components/core-requirements--acceptance-criteria.yaml
    bind:
      section_id: acceptance-criteria
guidance:
  purpose: Canonical base structure for the requirements template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - business-requirements
- key: business_requirements
  token: '{{business_requirements}}'
  consumed_by_sections:
  - business-requirements
- key: functional_requirements
  token: '{{functional_requirements}}'
  consumed_by_sections:
  - functional-requirements
- key: non_functional_requirements
  token: '{{non_functional_requirements}}'
  consumed_by_sections:
  - non-functional-requirements
- key: constraints
  token: '{{constraints}}'
  consumed_by_sections:
  - constraints
- key: assumptions
  token: '{{assumptions}}'
  consumed_by_sections:
  - assumptions
- key: traceability
  token: '{{traceability}}'
  consumed_by_sections:
  - traceability
- key: acceptance_criteria
  token: '{{acceptance_criteria}}'
  consumed_by_sections:
  - acceptance-criteria
