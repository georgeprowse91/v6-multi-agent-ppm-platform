metadata:
  template_id: project-charter
  title: Project Charter
  version: 1.0.0
  owner: PMO
  classification: core
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
sections:
- id: problem-statement
  title: Problem Statement
  type: narrative
  required_level: mandatory
  tailoring_rules:
  - Keep as a focused 2-6 sentence narrative for all project sizes.
  - For high-risk projects, explicitly quantify business or operational impact.
  applicability_conditions: Always applicable.
  consumes_placeholders:
  - '{{project_name}}'
  - '{{problem_statement}}'
- id: objectives
  title: Objectives
  type: narrative
  required_level: mandatory
  tailoring_rules:
  - Document measurable outcomes for all governance tiers.
  - For small projects, limit to the top 3-5 objectives.
  applicability_conditions: Always applicable.
  consumes_placeholders:
  - '{{objectives}}'
- id: scope
  title: Scope
  type: narrative
  required_level: mandatory
  tailoring_rules:
  - Define in-scope and out-of-scope boundaries.
  - For high governance tier projects, include explicit boundary controls and assumptions.
  applicability_conditions: Always applicable.
  consumes_placeholders:
  - '{{scope}}'
- id: success-criteria
  title: Success Criteria
  type: narrative
  required_level: mandatory
  tailoring_rules:
  - Use objective acceptance criteria with baseline and target values.
  - For low-risk initiatives, a concise metric set is acceptable when traceable to objectives.
  applicability_conditions: Always applicable.
  consumes_placeholders:
  - '{{success_criteria}}'
- id: governance
  title: Governance
  type: narrative
  required_level: recommended
  tailoring_rules:
  - Minimum: identify decision owner and escalation path.
  - For medium/large projects or governance tier 2+, define cadence and forum structure.
  applicability_conditions: Required when governance tier is 2 or 3; optional for tier 1.
  consumes_placeholders:
  - '{{governance}}'
- id: milestones
  title: Milestones
  type: narrative
  required_level: recommended
  tailoring_rules:
  - Capture major stage gates or delivery checkpoints.
  - For small projects, milestone list may be condensed to 3-5 key dates.
  applicability_conditions: Applicable when the project has phased or date-driven delivery.
  consumes_placeholders:
  - '{{milestones}}'
- id: budget-summary
  title: Budget Summary
  type: narrative
  required_level: recommended
  tailoring_rules:
  - Provide total budget and major cost buckets.
  - For high-risk or governance tier 3 projects, include contingency and variance tolerance.
  applicability_conditions: Required when financial approval is needed; optional for non-funded internal efforts.
  consumes_placeholders:
  - '{{budget_summary}}'
  - '{{total_budget}}'
- id: risks-assumptions-dependencies
  title: Risks Assumptions Dependencies
  type: narrative
  required_level: mandatory
  tailoring_rules:
  - Include top risks, key assumptions, and external dependencies.
  - For high-risk projects, add owners and mitigation intent for each item.
  applicability_conditions: Always applicable.
  consumes_placeholders:
  - '{{risks_assumptions_dependencies}}'
guidance:
  purpose: Canonical base structure for the project-charter template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - problem-statement
- key: problem_statement
  token: '{{problem_statement}}'
  consumed_by_sections:
  - problem-statement
- key: objectives
  token: '{{objectives}}'
  consumed_by_sections:
  - objectives
- key: scope
  token: '{{scope}}'
  consumed_by_sections:
  - scope
- key: success_criteria
  token: '{{success_criteria}}'
  consumed_by_sections:
  - success-criteria
- key: governance
  token: '{{governance}}'
  consumed_by_sections:
  - governance
- key: milestones
  token: '{{milestones}}'
  consumed_by_sections:
  - milestones
- key: budget_summary
  token: '{{budget_summary}}'
  consumed_by_sections:
  - budget-summary
- key: risks_assumptions_dependencies
  token: '{{risks_assumptions_dependencies}}'
  consumed_by_sections:
  - risks-assumptions-dependencies
- key: total_budget
  token: '{{total_budget}}'
  consumed_by_sections:
  - budget-summary
