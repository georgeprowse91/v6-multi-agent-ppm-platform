metadata:
  template_id: project-charter
  title: Project Charter
  version: 1.0.0
  owner: PMO
  classification: core
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
sections:
- id: problem-statement
  title: Problem Statement
  type: narrative
  consumes_placeholders:
  - '{{project_name}}'
  - '{{problem_statement}}'
- id: objectives
  title: Objectives
  type: narrative
  consumes_placeholders:
  - '{{objectives}}'
- id: scope
  title: Scope
  type: narrative
  consumes_placeholders:
  - '{{scope}}'
- id: success-criteria
  title: Success Criteria
  type: narrative
  consumes_placeholders:
  - '{{success_criteria}}'
- id: governance
  title: Governance
  type: narrative
  consumes_placeholders:
  - '{{governance}}'
- id: milestones
  title: Milestones
  type: narrative
  consumes_placeholders:
  - '{{milestones}}'
- id: budget-summary
  title: Budget Summary
  type: narrative
  consumes_placeholders:
  - '{{budget_summary}}'
  - '{{total_budget}}'
- id: risks-assumptions-dependencies
  title: Risks Assumptions Dependencies
  type: narrative
  consumes_placeholders:
  - '{{risks_assumptions_dependencies}}'
guidance:
  purpose: Canonical base structure for the project-charter template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - problem-statement
- key: problem_statement
  token: '{{problem_statement}}'
  consumed_by_sections:
  - problem-statement
- key: objectives
  token: '{{objectives}}'
  consumed_by_sections:
  - objectives
- key: scope
  token: '{{scope}}'
  consumed_by_sections:
  - scope
- key: success_criteria
  token: '{{success_criteria}}'
  consumed_by_sections:
  - success-criteria
- key: governance
  token: '{{governance}}'
  consumed_by_sections:
  - governance
- key: milestones
  token: '{{milestones}}'
  consumed_by_sections:
  - milestones
- key: budget_summary
  token: '{{budget_summary}}'
  consumed_by_sections:
  - budget-summary
- key: risks_assumptions_dependencies
  token: '{{risks_assumptions_dependencies}}'
  consumed_by_sections:
  - risks-assumptions-dependencies
- key: total_budget
  token: '{{total_budget}}'
  consumed_by_sections:
  - budget-summary
