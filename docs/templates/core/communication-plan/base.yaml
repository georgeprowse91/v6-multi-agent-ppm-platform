metadata:
  template_id: communication-plan
  title: Communication Plan
  version: 1.0.0
  owner: PMO
  classification: core
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
sections:
- id: data-table
  title: Data Table
  type: table
  columns:
  - name: stakeholder-group
    type: string
  - name: communication-objective
    type: string
  - name: channel
    type: string
  - name: cadence
    type: string
  - name: sender
    type: string
  - name: escalation-path
    type: string
  - name: success-measure
    type: string
  consumes_placeholders:
  - '{{project_name}}'
  - '{{stakeholder_group}}'
  - '{{communication_objective}}'
  - '{{channel}}'
  - '{{cadence}}'
  - '{{sender}}'
  - '{{escalation_path}}'
  - '{{success_measure}}'
guidance:
  purpose: Canonical base structure for the communication-plan template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - data-table
- key: stakeholder_group
  token: '{{stakeholder_group}}'
  consumed_by_sections:
  - data-table
- key: communication_objective
  token: '{{communication_objective}}'
  consumed_by_sections:
  - data-table
- key: channel
  token: '{{channel}}'
  consumed_by_sections:
  - data-table
- key: cadence
  token: '{{cadence}}'
  consumed_by_sections:
  - data-table
- key: sender
  token: '{{sender}}'
  consumed_by_sections:
  - data-table
- key: escalation_path
  token: '{{escalation_path}}'
  consumed_by_sections:
  - data-table
- key: success_measure
  token: '{{success_measure}}'
  consumed_by_sections:
  - data-table
