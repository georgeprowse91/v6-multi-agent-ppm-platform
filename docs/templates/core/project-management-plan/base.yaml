metadata:
  template_id: project-management-plan
  title: Project Management Plan
  version: 1.0.0
  owner: PMO
  classification: core
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
sections:
- id: project-overview
  title: Project Overview
  type: narrative
  consumes_placeholders:
  - '{{project_name}}'
  - '{{project_overview}}'
- id: management-approach
  title: Management Approach
  type: narrative
  consumes_placeholders:
  - '{{management_approach}}'
- id: scope-baseline
  title: Scope Baseline
  type: narrative
  consumes_placeholders:
  - '{{scope_baseline}}'
- id: schedule-baseline
  title: Schedule Baseline
  type: narrative
  consumes_placeholders:
  - '{{schedule_baseline}}'
- id: cost-baseline
  title: Cost Baseline
  type: narrative
  consumes_placeholders:
  - '{{cost_baseline}}'
- id: quality-management
  title: Quality Management
  type: narrative
  consumes_placeholders:
  - '{{quality_management}}'
- id: risk-management
  title: Risk Management
  type: narrative
  consumes_placeholders:
  - '{{risk_management}}'
- id: change-control
  title: Change Control
  type: narrative
  consumes_placeholders:
  - '{{change_control}}'
- id: stakeholder-engagement
  title: Stakeholder Engagement
  type: narrative
  consumes_placeholders:
  - '{{stakeholder_engagement}}'
guidance:
  purpose: Canonical base structure for the project-management-plan template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - project-overview
- key: project_overview
  token: '{{project_overview}}'
  consumed_by_sections:
  - project-overview
- key: management_approach
  token: '{{management_approach}}'
  consumed_by_sections:
  - management-approach
- key: scope_baseline
  token: '{{scope_baseline}}'
  consumed_by_sections:
  - scope-baseline
- key: schedule_baseline
  token: '{{schedule_baseline}}'
  consumed_by_sections:
  - schedule-baseline
- key: cost_baseline
  token: '{{cost_baseline}}'
  consumed_by_sections:
  - cost-baseline
- key: quality_management
  token: '{{quality_management}}'
  consumed_by_sections:
  - quality-management
- key: risk_management
  token: '{{risk_management}}'
  consumed_by_sections:
  - risk-management
- key: change_control
  token: '{{change_control}}'
  consumed_by_sections:
  - change-control
- key: stakeholder_engagement
  token: '{{stakeholder_engagement}}'
  consumed_by_sections:
  - stakeholder-engagement
