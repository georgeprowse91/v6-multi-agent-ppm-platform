      section_id: budget-performance
  - component_instance_id: executive-dashboard--top-risks
    ref: ../../components/risks.yaml
    bind:
      section_id: top-risks
  - component_instance_id: executive-dashboard--benefits-realization
    ref: ../../components/benefits.yaml
    bind:
      section_id: benefits-realization
  - component_instance_id: core-executive-dashboard--decisions-required
    ref: ../../components/core-executive-dashboard--decisions-required.yaml
    bind:
      section_id: decisions-required
guidance:
  purpose: Canonical base structure for the executive-dashboard template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
