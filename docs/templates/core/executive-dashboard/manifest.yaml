      section_id: portfolio-health
  - component_instance_id: core-executive-dashboard--schedule-performance
    ref: ../../components/core-executive-dashboard--schedule-performance.yaml
    bind:
      section_id: schedule-performance
  - component_instance_id: core-executive-dashboard--budget-performance
    ref: ../../components/core-executive-dashboard--budget-performance.yaml
