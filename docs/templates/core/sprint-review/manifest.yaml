metadata:
  template_id: sprint-review
  title: Sprint Review
  version: 1.0.0
  owner: Product+Engineering
  classification: core
  composition_model: modular-v1
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
composition:
  order:
  - component_instance_id: core-sprint-review--sprint-goal-outcome
    ref: ../../components/core-sprint-review--sprint-goal-outcome.yaml
    bind:
      section_id: sprint-goal-outcome
  - component_instance_id: core-sprint-review--completed-increment
    ref: ../../components/core-sprint-review--completed-increment.yaml
    bind:
      section_id: completed-increment
  - component_instance_id: core-sprint-review--rejected-or-carried-over-items
    ref: ../../components/core-sprint-review--rejected-or-carried-over-items.yaml
    bind:
      section_id: rejected-or-carried-over-items
  - component_instance_id: core-sprint-review--stakeholder-feedback
    ref: ../../components/core-sprint-review--stakeholder-feedback.yaml
    bind:
      section_id: stakeholder-feedback
  - component_instance_id: core-sprint-review--backlog-adjustments
    ref: ../../components/core-sprint-review--backlog-adjustments.yaml
    bind:
      section_id: backlog-adjustments
guidance:
  purpose: Canonical base structure for the sprint-review template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - sprint-goal-outcome
- key: sprint_goal_outcome
  token: '{{sprint_goal_outcome}}'
  consumed_by_sections:
  - sprint-goal-outcome
- key: completed_increment
  token: '{{completed_increment}}'
  consumed_by_sections:
  - completed-increment
- key: rejected_or_carried_over_items
  token: '{{rejected_or_carried_over_items}}'
  consumed_by_sections:
  - rejected-or-carried-over-items
- key: stakeholder_feedback
  token: '{{stakeholder_feedback}}'
  consumed_by_sections:
  - stakeholder-feedback
- key: backlog_adjustments
  token: '{{backlog_adjustments}}'
  consumed_by_sections:
  - backlog-adjustments
