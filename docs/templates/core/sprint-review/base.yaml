metadata:
  template_id: sprint-review
  title: Sprint Review
  version: 1.0.0
  owner: Product+Engineering
  classification: core
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
sections:
- id: sprint-goal-outcome
  title: Sprint Goal Outcome
  type: narrative
- id: completed-increment
  title: Completed Increment
  type: narrative
- id: rejected-or-carried-over-items
  title: Rejected Or Carried Over Items
  type: narrative
- id: stakeholder-feedback
  title: Stakeholder Feedback
  type: narrative
- id: backlog-adjustments
  title: Backlog Adjustments
  type: narrative
guidance:
  purpose: Canonical base structure for the sprint-review template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
placeholders:
- key: sprint_goal_outcome
  token: '{{sprint_goal_outcome}}'
