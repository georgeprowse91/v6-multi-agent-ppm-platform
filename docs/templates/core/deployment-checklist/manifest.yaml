metadata:
  template_id: deployment-checklist
  title: Deployment Checklist
  version: 1.0.0
  status: active
  replaces: null
  replaced_by: null
  aliases: []
  owner: Engineering
  classification: core
  composition_model: modular-v1
inputs:
- name: project_name
  type: string
  required: true
- name: prepared_by
  type: string
  required: false
- name: reporting_period
  type: string
  required: false
composition:
  order:
  - component_instance_id: core-deployment-checklist--pre-deployment
    ref: ../../components/core-deployment-checklist--pre-deployment.yaml
    bind:
      section_id: pre-deployment
  - component_instance_id: core-deployment-checklist--deployment
    ref: ../../components/core-deployment-checklist--deployment.yaml
    bind:
      section_id: deployment
  - component_instance_id: core-deployment-checklist--post-deployment
    ref: ../../components/core-deployment-checklist--post-deployment.yaml
    bind:
      section_id: post-deployment
guidance:
  purpose: Canonical base structure for the deployment-checklist template.
  authoring_notes: Use concise, role-specific language. Keep each narrative block
    as 2-6 sentences and avoid embedding methodology-specific guidance in core templates.
  quality_gates:
  - rollback-ready
  - approvals-complete
  - monitoring-enabled
  - validation-complete
placeholders:
- key: project_name
  token: '{{project_name}}'
  consumed_by_sections:
  - pre-deployment
- key: pre_deployment
  token: '{{pre_deployment}}'
  consumed_by_sections:
  - pre-deployment
- key: deployment
  token: '{{deployment}}'
  consumed_by_sections:
  - deployment
- key: post_deployment
  token: '{{post_deployment}}'
  consumed_by_sections:
  - post-deployment
