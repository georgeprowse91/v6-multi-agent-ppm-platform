name: CD Pipeline

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api-gateway/Dockerfile
          push: false
          load: true
          tags: multi-agent-ppm:cd-${{ github.sha }}

      - name: Verify API gateway import
        run: |
          docker run --rm multi-agent-ppm:cd-${{ github.sha }} \
            python -c "import sys; sys.path.insert(0, '/app/apps/api-gateway/src'); import api; print('API import OK')"
