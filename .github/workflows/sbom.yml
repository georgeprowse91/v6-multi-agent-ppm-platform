name: SBOM Generation

on:
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    env:
      SIGNING_PRIVATE_KEY_B64: ${{ secrets.SIGNING_PRIVATE_KEY_B64 }}
      SIGNING_PUBLIC_KEY_B64: ${{ secrets.SIGNING_PUBLIC_KEY_B64 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate SBOM
        run: python scripts/generate-sbom.py

      - name: Verify signing material is available
        run: |
          test -n "$SIGNING_PRIVATE_KEY_B64"
          test -n "$SIGNING_PUBLIC_KEY_B64"

      - name: Sign SBOM
        run: python scripts/sign-artifact.py

      - name: Verify signature
        run: python scripts/verify-signature.py

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dist/sbom.json
