<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPM Platform Console</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>PPM Platform Console</h1>
        <p>Secure, tenant-aware access to workflows and portfolio services.</p>
      </header>
      <section class="card">
        <h2>Session</h2>
        <p id="session-info" class="status">Checking session...</p>
        <div class="actions">
          <button id="login">Sign in with OIDC</button>
          <button id="logout" class="secondary">Sign out</button>
        </div>
      </section>

      <section class="card">
        <h2>API Gateway Status</h2>
        <button id="load-status">Load Status</button>
        <pre id="status-output"></pre>
      </section>

      <section class="card">
        <h2>Start Workflow</h2>
        <label>
          Workflow ID
          <input id="workflow-id" type="text" value="intake-triage" />
        </label>
        <button id="start-workflow">Start Workflow</button>
        <pre id="workflow-output"></pre>
      </section>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
