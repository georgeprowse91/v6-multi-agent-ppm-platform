replicaCount: 2

image:
  repository: ghcr.io/georgeprowse91/web
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8501

env:
  LOG_LEVEL: info
  API_GATEWAY_URL: "http://api-gateway:8000"
  IDENTITY_ACCESS_URL: "http://identity-access:8080"
  WORKFLOW_ENGINE_URL: "http://workflow-engine:8080"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  clusterIssuer: "letsencrypt-prod"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: ""


autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
