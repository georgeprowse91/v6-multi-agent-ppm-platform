{{- if .Values.keyVault.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "name" . }}-kv
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
  annotations:
    azure.workload.identity/client-id: {{ required "keyVault.clientId is required when keyVault.enabled is true" .Values.keyVault.clientId | quote }}
{{- end }}
