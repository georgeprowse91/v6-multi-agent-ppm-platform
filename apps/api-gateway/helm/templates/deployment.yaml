apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "name" . }}
    spec:
      {{- if .Values.keyVault.enabled }}
      serviceAccountName: {{ include "name" . }}-kv
      {{- end }}
      containers:
        - name: {{ include "name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: IDENTITY_ACCESS_URL
              value: {{ .Values.env.IDENTITY_ACCESS_URL | quote }}
            - name: POLICY_ENGINE_URL
              value: {{ .Values.env.POLICY_ENGINE_URL | quote }}
            {{- if .Values.keyVault.enabled }}
            - name: IDENTITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keyVault.secretName | quote }}
                  key: {{ .Values.keyVault.secrets.identityJwtSecret | quote }}
            - name: POLICY_ENGINE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keyVault.secretName | quote }}
                  key: {{ .Values.keyVault.secrets.policyEngineServiceToken | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: keyvault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "name" . }}-kv
      {{- end }}
