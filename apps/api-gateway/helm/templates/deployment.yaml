apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "name" . }}
    spec:
      {{- $serviceAccountName := default (include "name" .) .Values.serviceAccount.name }}
      {{- if or .Values.keyVault.enabled .Values.leaderElection.enabled }}
      serviceAccountName: {{ $serviceAccountName }}
      {{- end }}
      containers:
        - name: {{ include "name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: DEMO_MODE
              value: {{ .Values.env.DEMO_MODE | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.env.ENVIRONMENT | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.env.ALLOWED_ORIGINS | quote }}
            - name: IDENTITY_ACCESS_URL
              value: {{ .Values.env.IDENTITY_ACCESS_URL | quote }}
            - name: POLICY_ENGINE_URL
              value: {{ .Values.env.POLICY_ENGINE_URL | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_METRICS_ENDPOINT | quote }}
            - name: RATE_LIMIT_DEFAULT
              value: {{ .Values.env.RATE_LIMIT_DEFAULT | quote }}
            - name: RATE_LIMIT_STORAGE
              value: {{ .Values.env.RATE_LIMIT_STORAGE | quote }}
            - name: CONNECTOR_CIRCUIT_FAILURE_THRESHOLD
              value: {{ .Values.env.CONNECTOR_CIRCUIT_FAILURE_THRESHOLD | quote }}
            - name: CONNECTOR_CIRCUIT_RECOVERY_SECONDS
              value: {{ .Values.env.CONNECTOR_CIRCUIT_RECOVERY_SECONDS | quote }}
            - name: CONNECTOR_CIRCUIT_HALF_OPEN_SUCCESSES
              value: {{ .Values.env.CONNECTOR_CIRCUIT_HALF_OPEN_SUCCESSES | quote }}
            {{- if .Values.leaderElection.enabled }}
            - name: LEADER_ELECTION_ENABLED
              value: "true"
            - name: LEADER_ELECTION_CONFIGMAP
              value: {{ .Values.leaderElection.configMapName | quote }}
            - name: LEADER_ELECTION_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEADER_ELECTION_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LEADER_ELECTION_LEASE_SECONDS
              value: {{ .Values.leaderElection.leaseDurationSeconds | quote }}
            - name: LEADER_ELECTION_RENEW_SECONDS
              value: {{ .Values.leaderElection.renewDeadlineSeconds | quote }}
            - name: LEADER_ELECTION_RETRY_SECONDS
              value: {{ .Values.leaderElection.retryPeriodSeconds | quote }}
            - name: LEADER_ELECTION_FAIL_OPEN
              value: {{ .Values.leaderElection.failOpen | quote }}
            {{- end }}
            {{- if .Values.keyVault.enabled }}
            - name: IDENTITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keyVault.secretName | quote }}
                  key: {{ .Values.keyVault.secrets.identityJwtSecret | quote }}
            - name: POLICY_ENGINE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keyVault.secretName | quote }}
                  key: {{ .Values.keyVault.secrets.policyEngineServiceToken | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: keyvault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "name" . }}-kv
      {{- end }}
