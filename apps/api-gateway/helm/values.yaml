replicaCount: 2

image:
  repository: ghcr.io/georgeprowse91/api-gateway
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  LOG_LEVEL: info
  ENVIRONMENT: "development"
  ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8501,http://localhost:8000"
  IDENTITY_ACCESS_URL: "http://identity-access:8080"
  IDENTITY_OIDC_DISCOVERY_URL: ""
  IDENTITY_TENANT_CLAIM: "tenant_id"
  IDENTITY_ROLES_CLAIM: "roles"
  POLICY_ENGINE_URL: "http://policy-engine:8080"
  ABAC_ENFORCEMENT: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
  RATE_LIMIT_DEFAULT: "100/minute"
  RATE_LIMIT_STORAGE: "memory://"

keyVault:
  enabled: false
  name: ""
  tenantId: ""
  clientId: ""
  secretName: "ppm-secrets"
  secrets:
    identityJwtSecret: "identity-jwt-secret"
    policyEngineServiceToken: "policy-engine-service-token"

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  clusterIssuer: "letsencrypt-prod"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: ""


autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
