replicaCount: 2

image:
  repository: ghcr.io/georgeprowse91/api-gateway
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  LOG_LEVEL: info
  IDENTITY_ACCESS_URL: "http://identity-access:8080"
  POLICY_ENGINE_URL: "http://policy-engine:8080"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"

keyVault:
  enabled: false
  name: ""
  tenantId: ""
  clientId: ""
  secretName: "ppm-secrets"
  secrets:
    identityJwtSecret: "identity-jwt-secret"
    policyEngineServiceToken: "policy-engine-service-token"

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: ""
