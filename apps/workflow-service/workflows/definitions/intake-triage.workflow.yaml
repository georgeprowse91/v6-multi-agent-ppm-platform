apiVersion: ppm.workflows/v1
kind: Workflow
metadata:
  name: intake-triage
  version: "1.0.0"
  owner: workflow-service
  description: Route new portfolio intake requests to the right agent.
steps:
  - id: capture-intake
    type: task
    next: evaluate-risk
    config:
      agent: demand_intake_agent
      action: capture_request
  - id: evaluate-risk
    type: decision
    next: notify-owner
    config:
      agent: risk_management_agent
      action: score_risk
  - id: notify-owner
    type: notification
    next: null
    config:
      channel: teams
      template: intake-triage-summary
