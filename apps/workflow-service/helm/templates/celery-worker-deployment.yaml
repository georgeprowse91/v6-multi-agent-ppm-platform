{{- if .Values.celery.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}-celery
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: celery-worker
spec:
  replicas: {{ .Values.celery.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "name" . }}
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "name" . }}
        app.kubernetes.io/component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
{{ toYaml .Values.celery.command | indent 12 }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: WORKFLOW_BROKER_URL
              value: {{ .Values.env.WORKFLOW_BROKER_URL | quote }}
            - name: WORKFLOW_RESULT_BACKEND
              value: {{ .Values.env.WORKFLOW_RESULT_BACKEND | quote }}
          resources:
{{ toYaml .Values.celery.resources | indent 12 }}
{{- end }}
