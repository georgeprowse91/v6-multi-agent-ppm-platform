{{- if .Values.broker.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}-broker
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "name" . }}
      app.kubernetes.io/component: broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "name" . }}
        app.kubernetes.io/component: broker
    spec:
      containers:
        - name: redis
          image: {{ .Values.broker.redis.image | quote }}
          ports:
            - containerPort: {{ .Values.broker.redis.port }}
          resources:
{{ toYaml .Values.broker.redis.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "name" . }}-broker
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: broker
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.broker.redis.port }}
      targetPort: {{ .Values.broker.redis.port }}
  selector:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: broker
{{- end }}
