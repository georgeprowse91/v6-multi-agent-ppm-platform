replicaCount: 2

image:
  repository: ghcr.io/georgeprowse91/workflow-engine
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  LOG_LEVEL: info
  ENVIRONMENT: "development"
  DEMO_MODE: "false"
  AUDIT_LOG_URL: "http://audit-log:8080"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
  WORKFLOW_BROKER_URL: "redis://workflow-broker:6379/0"
  WORKFLOW_RESULT_BACKEND: "redis://workflow-broker:6379/0"
  WORKFLOW_DB_PATH: "/data/workflows/workflows.db"
rateLimit: "100/minute"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 400m
    memory: 512Mi

celery:
  enabled: true
  replicaCount: 2
  command:
    - celery
    - -A
    - workflow.tasks
    - worker
    - --loglevel=info
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

broker:
  redis:
    enabled: true
    image: redis:7.2-alpine
    port: 6379
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  rabbitmq:
    enabled: false
    image: rabbitmq:3.13-management
    port: 5672
    managementPort: 15672
    resources: {}

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  clusterIssuer: "letsencrypt-prod"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: ""


autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
