apiVersion: ppm.workflows/v1
kind: Workflow
metadata:
  name: deployment-rollback
  version: "1.0.0"
  owner: workflow-engine
  description: Roll back deployments with validation checks and notifications.
steps:
  - id: detect-issue
    type: task
    next: validate-rollback
    config:
      agent: monitoring_agent
      action: detect_deployment_issue
  - id: validate-rollback
    type: decision
    next: execute-rollback
    branches:
      - name: minor
        condition:
          field: $.payload.severity
          operator: equals
          value: minor
        next: notify-no-rollback
    default_next: execute-rollback
  - id: execute-rollback
    type: task
    next: post-rollback-check
    retry:
      max_attempts: 3
      delay_seconds: 10
    config:
      agent: deployment_agent
      action: rollback_release
  - id: post-rollback-check
    type: task
    next: notify-rollback
    config:
      agent: monitoring_agent
      action: verify_stability
  - id: notify-rollback
    type: notification
    next: null
    config:
      channel: teams
      template: deployment-rollback-complete
  - id: notify-no-rollback
    type: notification
    next: null
    config:
      channel: teams
      template: deployment-rollback-not-required
