id: planview
version: 1.0.0
name: Planview
description: Sync portfolio and project data from Planview.
owner: integration-team
category: ppm
status: available
icon: planview
auth:
  type: oauth2
  token_url: https://api.planview.com/oauth2/token
  scopes:
  - read
  fields:
  - client_id
  - client_secret
  - refresh_token
  - instance_url
config_fields:
- name: instance_url
  type: url
  required: true
  label: Instance URL
- name: portfolio_id
  type: string
  required: false
  label: Portfolio ID
env_vars:
- PLANVIEW_INSTANCE_URL
- PLANVIEW_CLIENT_ID
- PLANVIEW_CLIENT_SECRET
- PLANVIEW_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 2 * * *
  supports_webhooks: false
  rate_limit_per_minute: 200
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
