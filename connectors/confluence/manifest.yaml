id: confluence
version: 1.0.0
name: Confluence
description: Confluence connector runtime manifest.
owner: integration-team
category: doc_mgmt
status: available
icon: confluence
auth:
  type: api_key
  fields:
  - api_key
config_fields:
- name: instance_url
  type: url
  required: true
  label: Instance URL
- name: space_key
  type: string
  required: false
  label: Space Key
env_vars:
- CONFLUENCE_URL
- CONFLUENCE_EMAIL
- CONFLUENCE_API_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
