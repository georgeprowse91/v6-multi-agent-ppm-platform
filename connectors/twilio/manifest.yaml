id: twilio
version: 1.0.0
name: Twilio
description: Send SMS notifications via Twilio APIs.
owner: integration-team
category: collaboration
status: available
icon: twilio
auth:
  type: basic
  fields:
  - account_sid
  - auth_token
  - base_url
config_fields: []
env_vars: []
sync:
  modes:
  - incremental
  default_schedule: '*/30 * * * *'
  supports_webhooks: true
  rate_limit_per_minute: 60
  directions:
  - outbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: true
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
