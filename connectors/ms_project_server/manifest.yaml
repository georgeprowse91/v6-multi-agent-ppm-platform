id: ms_project_server
version: 1.0.0
name: Ms Project Server
description: Ms Project Server connector runtime manifest.
owner: integration-team
category: ppm
status: available
icon: microsoft
auth:
  type: api_key
  fields:
  - api_key
config_fields:
- name: tenant_id
  type: string
  required: true
  label: Azure Tenant ID
- name: site_url
  type: url
  required: true
  label: Project Web App URL
env_vars:
- MS_PROJECT_TENANT_ID
- MS_PROJECT_SITE_URL
- MS_PROJECT_CLIENT_ID
- MS_PROJECT_CLIENT_SECRET
- MS_PROJECT_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
