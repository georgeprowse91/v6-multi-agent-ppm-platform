id: oracle
version: 1.0.0
name: Oracle
description: Oracle connector runtime manifest.
owner: integration-team
category: erp
status: available
icon: oracle
auth:
  type: api_key
  fields:
  - api_key
config_fields:
- name: instance_url
  type: url
  required: true
  label: Oracle Cloud URL
env_vars:
- ORACLE_URL
- ORACLE_CLIENT_ID
- ORACLE_CLIENT_SECRET
- ORACLE_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
