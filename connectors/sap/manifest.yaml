id: sap
version: 1.0.0
name: SAP
description: Sync finance and portfolio data from SAP ERP.
owner: integration-team
category: erp
status: available
icon: sap
auth:
  type: basic
  fields:
  - username
  - password
  - instance_url
config_fields:
- name: instance_url
  type: url
  required: true
  label: SAP Instance URL
- name: client_id
  type: string
  required: true
  label: SAP Client ID
env_vars:
- SAP_URL
- SAP_USERNAME
- SAP_PASSWORD
- SAP_CLIENT
sync:
  modes:
  - full
  - incremental
  default_schedule: 30 */6 * * *
  supports_webhooks: false
  rate_limit_per_minute: 120
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 2
  tier: strategic
  business_priority: 6
  capabilities:
    read: true
    write: true
    webhook: false
    declarative_mapping: true
    idempotent_write: true
    conflict_handling: true
  notes: Level 2 priority connector baseline
