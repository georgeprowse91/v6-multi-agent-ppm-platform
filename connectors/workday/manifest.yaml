id: workday
version: 1.0.0
name: Workday
description: Sync resource capacity and workforce data from Workday.
owner: integration-team
category: hris
status: available
icon: workday
auth:
  type: oauth2
  token_url: https://wd3-impl-services1.workday.com/ccx/oauth2/token
  fields:
  - api_url
  - client_id
  - client_secret
  - refresh_token
  - token_url
config_fields:
- name: instance_url
  type: url
  required: false
  label: API Base URL
- name: tenant_name
  type: string
  required: true
  label: Tenant Name
env_vars:
- WORKDAY_API_URL
- WORKDAY_CLIENT_ID
- WORKDAY_CLIENT_SECRET
- WORKDAY_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 */12 * * *
  supports_webhooks: false
  rate_limit_per_minute: 120
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: resource
  target: resource
  mapping_file: mappings/resource.yaml
maturity:
  level: 2
  tier: strategic
  business_priority: 5
  capabilities:
    read: true
    write: true
    webhook: false
    declarative_mapping: true
    idempotent_write: true
    conflict_handling: true
  notes: Level 2 priority connector baseline
