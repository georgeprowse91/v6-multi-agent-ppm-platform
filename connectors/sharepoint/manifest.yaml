id: sharepoint
version: 1.0.0
name: SharePoint
description: Sync project documents from SharePoint libraries.
owner: integration-team
category: doc_mgmt
status: available
icon: sharepoint
auth:
  type: oauth2
  token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token
  scopes:
  - Sites.Read.All
  fields:
  - client_id
  - client_secret
  - refresh_token
  - tenant_id
  - site_url
config_fields:
- name: site_url
  type: url
  required: true
  label: SharePoint Site URL
- name: document_library
  type: string
  required: false
  label: Document Library
env_vars:
- SHAREPOINT_SITE_URL
- SHAREPOINT_CLIENT_ID
- SHAREPOINT_CLIENT_SECRET
- SHAREPOINT_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 */8 * * *
  supports_webhooks: true
  rate_limit_per_minute: 400
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: true
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
