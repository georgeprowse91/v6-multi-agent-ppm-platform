id: sap_successfactors
version: 1.0.0
name: Sap Successfactors
description: Sap Successfactors connector runtime manifest.
owner: integration-team
category: hris
status: available
icon: sap
auth:
  type: api_key
  fields:
  - api_key
config_fields:
- name: api_server
  type: url
  required: true
  label: API Server URL
- name: company_id
  type: string
  required: true
  label: Company ID
env_vars:
- SF_API_SERVER
- SF_COMPANY_ID
- SF_CLIENT_ID
- SF_CLIENT_SECRET
- SF_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
