id: slack
version: 1.0.0
name: Slack
description: Sync collaboration metadata and notifications from Slack.
owner: integration-team
category: collaboration
auth:
  type: api_key
  fields:
  - bot_token
  - signing_secret
  - default_channel
sync:
  modes:
  - full
  - incremental
  default_schedule: '*/30 * * * *'
  supports_webhooks: true
  rate_limit_per_minute: 1000
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: resource
  target: resource
  mapping_file: mappings/resource.yaml
maturity:
  level: 2
  tier: strategic
  business_priority: 7
  capabilities:
    read: true
    write: true
    webhook: true
    declarative_mapping: true
    idempotent_write: true
    conflict_handling: true
  notes: Level 2 priority connector baseline
