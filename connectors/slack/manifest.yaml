id: slack
version: 1.0.0
name: Slack
description: Sync collaboration metadata and notifications from Slack.
owner: integration-team
category: collaboration
status: available
icon: slack
auth:
  type: api_key
  fields:
  - bot_token
  - signing_secret
  - default_channel
config_fields:
- name: instance_url
  type: url
  required: false
  label: API Base URL
- name: workspace_id
  type: string
  required: false
  label: Workspace ID
- name: default_channel
  type: string
  required: false
  label: Default Channel
env_vars:
- SLACK_BOT_TOKEN
- SLACK_SIGNING_SECRET
sync:
  modes:
  - full
  - incremental
  default_schedule: '*/30 * * * *'
  supports_webhooks: true
  rate_limit_per_minute: 1000
  directions:
  - outbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: resource
  target: resource
  mapping_file: mappings/resource.yaml
maturity:
  level: 2
  tier: strategic
  business_priority: 7
  capabilities:
    read: true
    write: true
    webhook: true
    declarative_mapping: true
    idempotent_write: true
    conflict_handling: true
  notes: Level 2 priority connector baseline
