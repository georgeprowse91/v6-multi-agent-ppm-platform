id: workday_mcp
version: 1.0.0
name: Workday (MCP)
description: Sync Workday HRIS data via MCP services.
owner: integration-team
category: hris
status: beta
icon: workday
system: workday
prefer_mcp: true
supported_operations:
- list_workers
- list_job_profiles
- list_positions
- list_organizations
protocol: mcp
auth:
  type: api_key
  fields:
  - mcp_server_url
  - mcp_server_id
  - tool_map
  - mcp_api_key
  - mcp_api_key_header
mcp:
  server_url: https://mcp.example.com
  server_id: workday
  protocol_version: '2025-06-18'
  tool_map:
    list_workers: workday.listWorkers
    list_job_profiles: workday.listJobProfiles
    list_positions: workday.listPositions
    list_organizations: workday.listOrganizations
mcp_server_url: https://mcp.example.com
mcp_server_id: workday
tool_map:
  list_workers: workday.listWorkers
  list_job_profiles: workday.listJobProfiles
  list_positions: workday.listPositions
  list_organizations: workday.listOrganizations
config_fields:
- name: mcp_server_url
  type: url
  required: true
  label: MCP Server URL
- name: mcp_scopes
  type: array
  required: false
  label: MCP Scopes
- name: tool_map
  type: object
  required: false
  label: MCP Tool Map
env_vars: []
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 */8 * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: resource
  target: resource
  mapping_file: mappings/resource.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
