id: clarity
version: 1.0.0
name: Clarity PPM
description: Sync portfolio and project data from Clarity PPM.
owner: integration-team
category: ppm
status: available
icon: clarity
auth:
  type: oauth2
  token_url: https://clarity.example.com/oauth/token
  scopes:
  - read
  fields:
  - client_id
  - client_secret
  - refresh_token
  - instance_url
config_fields:
- name: instance_url
  type: url
  required: true
  label: Instance URL
env_vars:
- CLARITY_INSTANCE_URL
- CLARITY_CLIENT_ID
- CLARITY_CLIENT_SECRET
- CLARITY_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 3 * * *
  supports_webhooks: false
  rate_limit_per_minute: 200
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
