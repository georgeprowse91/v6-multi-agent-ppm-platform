id: zoom
version: 1.0.0
name: Zoom
description: Zoom connector runtime manifest.
owner: integration-team
category: collaboration
status: available
icon: zoom
auth:
  type: api_key
  fields:
  - api_key
config_fields: []
env_vars:
- ZOOM_CLIENT_ID
- ZOOM_CLIENT_SECRET
- ZOOM_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
  - outbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
