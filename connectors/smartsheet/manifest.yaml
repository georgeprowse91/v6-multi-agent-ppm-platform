id: smartsheet
version: 1.0.0
name: Smartsheet
description: Sync schedules and sheets from Smartsheet.
owner: integration-team
category: pm
status: available
icon: smartsheet
auth:
  type: api_key
  fields:
  - api_token
  - base_url
config_fields: []
env_vars: []
sync:
  modes:
  - full
  - incremental
  default_schedule: '*/30 * * * *'
  supports_webhooks: false
  rate_limit_per_minute: 60
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 2
  tier: strategic
  business_priority: 10
  capabilities:
    read: true
    write: true
    webhook: false
    declarative_mapping: true
    idempotent_write: true
    conflict_handling: true
  notes: Level 2 priority connector baseline
