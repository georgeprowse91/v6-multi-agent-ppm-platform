id: planview_mcp
version: 1.0.0
name: Planview (MCP)
description: Sync portfolio and project data from Planview via an MCP server.
owner: integration-team
category: ppm
status: beta
icon: planview
system: planview
prefer_mcp: true
supported_operations:
- list
- create
protocol: mcp
auth:
  type: api_key
  fields:
  - mcp_server_url
  - mcp_server_id
  - tool_map
  - mcp_api_key
  - mcp_api_key_header
mcp:
  server_url: https://mcp.example.com
  server_id: planview
  protocol_version: '2025-06-18'
  tool_map:
    list_projects: planview.listProjects
    create_project: planview.createProject
mcp_server_url: https://mcp.example.com
mcp_server_id: planview
tool_map:
  list_projects: planview.listProjects
  create_project: planview.createProject
config_fields:
- name: mcp_server_url
  type: url
  required: true
  label: MCP Server URL
- name: mcp_scopes
  type: array
  required: false
  label: MCP Scopes
- name: tool_map
  type: object
  required: false
  label: MCP Tool Map
env_vars: []
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 2 * * *
  supports_webhooks: false
  rate_limit_per_minute: 200
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: ../planview/mappings/project.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
