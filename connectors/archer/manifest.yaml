id: archer
version: 1.0.0
name: Archer
description: Archer connector runtime manifest.
owner: integration-team
category: grc
status: available
icon: archer
auth:
  type: api_key
  fields:
  - api_key
config_fields:
- name: instance_url
  type: url
  required: true
  label: Instance URL
env_vars:
- ARCHER_URL
- ARCHER_API_KEY
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
