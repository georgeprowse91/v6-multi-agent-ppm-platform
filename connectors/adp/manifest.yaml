id: adp
version: 1.0.0
name: Adp
description: Adp connector runtime manifest.
owner: integration-team
category: hris
status: available
icon: adp
auth:
  type: api_key
  fields:
  - api_key
config_fields: []
env_vars:
- ADP_API_URL
- ADP_CLIENT_ID
- ADP_CLIENT_SECRET
- ADP_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
