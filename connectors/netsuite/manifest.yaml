id: netsuite
version: 1.0.0
name: Netsuite
description: Netsuite connector runtime manifest.
owner: integration-team
category: erp
status: available
icon: netsuite
auth:
  type: api_key
  fields:
  - api_key
config_fields:
- name: instance_url
  type: url
  required: false
  label: REST Base URL
- name: account_id
  type: string
  required: true
  label: Account ID
env_vars:
- NETSUITE_ACCOUNT_ID
- NETSUITE_CONSUMER_KEY
- NETSUITE_CONSUMER_SECRET
- NETSUITE_REFRESH_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
