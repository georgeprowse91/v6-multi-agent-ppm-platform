id: jira
version: 1.0.0
name: Jira
description: Sync projects and work items from Atlassian Jira.
owner: integration-team
category: work-management
auth:
  type: api_key
  fields:
  - api_token
  - email
  - instance_url
sync:
  modes:
  - bi-directional
  default_schedule: 0 */4 * * *
  supports_webhooks: true
  rate_limit_per_minute: 600
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: work_item
  target: work-item
  mapping_file: mappings/work-item.yaml
maturity:
  level: 2
  tier: strategic
  business_priority: 1
  capabilities:
    read: true
    write: true
    webhook: true
    declarative_mapping: true
    idempotent_write: true
    conflict_handling: true
  notes: Level 2 priority connector baseline
