entity: project
source_system: jira
fields:
  - source_field: "key"
    target_field: "project.code"
    transform: "string"
  - source_field: "name"
    target_field: "project.name"
    transform: "string"
  - source_field: "projectTypeKey"
    target_field: "project.type"
    transform: "enum"
  - source_field: "lead.displayName"
    target_field: "project.owner_name"
    transform: "string"
  - source_field: "lead.emailAddress"
    target_field: "project.owner_email"
    transform: "string"
  - source_field: "insight.totalIssueCount"
    target_field: "project.metrics.work_item_count"
    transform: "integer"
  - source_field: "updated"
    target_field: "project.updated_at"
    transform: "datetime"
