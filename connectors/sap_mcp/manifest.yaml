id: sap_mcp
version: 1.0.0
name: SAP (MCP)
description: Sync SAP ERP data via MCP-backed OData services.
owner: integration-team
category: erp
status: beta
icon: sap
system: sap
prefer_mcp: true
supported_operations:
- list_invoices
- list_goods_receipts
- list_purchase_orders
- list_suppliers
protocol: mcp
auth:
  type: api_key
  fields:
  - mcp_server_url
  - mcp_server_id
  - tool_map
  - mcp_api_key
  - mcp_api_key_header
mcp:
  server_url: https://mcp.example.com
  server_id: sap
  protocol_version: '2025-06-18'
  tool_map:
    list_invoices: sap.listInvoices
    list_goods_receipts: sap.listGoodsReceipts
    list_purchase_orders: sap.listPurchaseOrders
    list_suppliers: sap.listSuppliers
mcp_server_url: https://mcp.example.com
mcp_server_id: sap
tool_map:
  list_invoices: sap.listInvoices
  list_goods_receipts: sap.listGoodsReceipts
  list_purchase_orders: sap.listPurchaseOrders
  list_suppliers: sap.listSuppliers
config_fields:
- name: mcp_server_url
  type: url
  required: true
  label: MCP Server URL
- name: mcp_scopes
  type: array
  required: false
  label: MCP Scopes
- name: tool_map
  type: object
  required: false
  label: MCP Tool Map
env_vars: []
sync:
  modes:
  - full
  - incremental
  default_schedule: 15 */6 * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: purchase_order
  target: purchase-order
  mapping_file: mappings/purchase-order.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
