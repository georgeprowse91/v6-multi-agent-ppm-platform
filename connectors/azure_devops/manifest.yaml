id: azure_devops
version: 1.0.0
name: Azure DevOps
description: Sync Azure DevOps projects and delivery work items.
owner: integration-team
category: pm
status: available
icon: azure
auth:
  type: token
  fields:
  - pat
  - organization_url
config_fields:
- name: organization_url
  type: url
  required: true
  label: Organization URL
- name: project_name
  type: string
  required: true
  label: Project Name
env_vars:
- AZURE_DEVOPS_ORG_URL
- AZURE_DEVOPS_PAT
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 */6 * * *
  supports_webhooks: true
  rate_limit_per_minute: 500
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: work_item
  target: work-item
  mapping_file: mappings/work-item.yaml
maturity:
  level: 2
  tier: strategic
  business_priority: 2
  capabilities:
    read: true
    write: true
    webhook: true
    declarative_mapping: true
    idempotent_write: true
    conflict_handling: true
  notes: Level 2 priority connector baseline
