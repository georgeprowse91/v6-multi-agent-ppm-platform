id: jira_mcp
version: 1.0.0
name: Jira (MCP)
description: Sync projects and work items from Jira via an MCP server.
owner: integration-team
category: pm
status: beta
icon: jira
system: jira
prefer_mcp: true
supported_operations:
- list
- create
- update
protocol: mcp
auth:
  type: api_key
  fields:
  - mcp_server_url
  - mcp_server_id
  - tool_map
  - mcp_api_key
  - mcp_api_key_header
mcp:
  server_url: https://mcp.example.com
  server_id: jira
  protocol_version: '2025-06-18'
  tool_map:
    list_projects: jira.listProjects
    list_work_items: jira.listIssues
    upsert_work_item: jira.upsertIssue
mcp_server_url: https://mcp.example.com
mcp_server_id: jira
tool_map:
  list_projects: jira.listProjects
  list_work_items: jira.listIssues
  upsert_work_item: jira.upsertIssue
config_fields:
- name: mcp_server_url
  type: url
  required: true
  label: MCP Server URL
- name: mcp_scopes
  type: array
  required: false
  label: MCP Scopes
- name: tool_map
  type: object
  required: false
  label: MCP Tool Map
env_vars: []
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 */4 * * *
  supports_webhooks: false
  rate_limit_per_minute: 600
  directions:
  - inbound
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
- source: work_item
  target: work-item
  mapping_file: mappings/work-item.yaml
maturity:
  level: 1
  tier: core
  business_priority: 99
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Baseline declarative mapping coverage
