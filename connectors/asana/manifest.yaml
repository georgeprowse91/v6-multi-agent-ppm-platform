id: asana
version: 1.0.0
name: Asana
description: Asana connector runtime manifest.
owner: integration-team
category: pm
status: available
icon: asana
auth:
  type: api_key
  fields:
  - api_key
config_fields:
- name: instance_url
  type: url
  required: false
  label: API Base URL
- name: workspace_gid
  type: string
  required: true
  label: Workspace GID
env_vars:
- ASANA_ACCESS_TOKEN
sync:
  modes:
  - full
  - incremental
  default_schedule: 0 * * * *
  supports_webhooks: false
  rate_limit_per_minute: 300
  directions:
  - inbound
  - bidirectional
mappings:
- source: project
  target: project
  mapping_file: mappings/project.yaml
maturity:
  level: 0
  tier: candidate
  business_priority: 1
  capabilities:
    read: true
    write: false
    webhook: false
    declarative_mapping: true
    idempotent_write: false
    conflict_handling: false
  notes: Migration baseline scaffold
