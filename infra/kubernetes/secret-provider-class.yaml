apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ppm-platform-secrets
  namespace: ppm-platform
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: ${AZURE_CLIENT_ID}
    tenantId: ${AZURE_TENANT_ID}
    keyvaultName: ppm-prod-vault
    cloudName: AzurePublicCloud
    objects: |
      array:
        - |
          objectName: database-connection-string
          objectType: secret
          objectVersion: ""
        - |
          objectName: openai-api-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: jwt-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: servicebus-connection-string
          objectType: secret
          objectVersion: ""
  secretObjects:
    - secretName: ppm-db-secret
      type: Opaque
      data:
        - objectName: database-connection-string
          key: connection-string
    - secretName: ppm-openai-secret
      type: Opaque
      data:
        - objectName: openai-api-key
          key: api-key
    - secretName: ppm-auth-secret
      type: Opaque
      data:
        - objectName: jwt-secret
          key: jwt-secret
    - secretName: ppm-servicebus-secret
      type: Opaque
      data:
        - objectName: servicebus-connection-string
          key: connection-string
