apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotation
  namespace: ppm
spec:
  schedule: "0 3 * * 0"
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: ppm-admin
          containers:
          - name: rotate-secrets
            image: mcr.microsoft.com/azure-cli:latest
            env:
            - name: VAULT_NAME
              valueFrom:
                secretKeyRef:
                  name: kv-config
                  key: vaultName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            command: ["/bin/bash", "/scripts/rotate_secrets.sh"]
          volumes:
          - name: scripts
            configMap:
              name: secret-rotation-scripts
              defaultMode: 0755
