apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppm-platform
  labels:
    app: ppm-platform
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ppm-platform
  template:
    metadata:
      labels:
        app: ppm-platform
      annotations:
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ppm-platform-sa
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ppm-platform-secrets
      containers:
        - name: ppm-api
          image: ppm-platform/api:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          env:
            - name: DATABASE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: ppm-db-secret
                  key: connection-string
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ppm-openai-secret
                  key: api-key
            - name: IDENTITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ppm-auth-secret
                  key: jwt-secret
            - name: AZURE_SERVICE_BUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: ppm-servicebus-secret
                  key: connection-string
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
