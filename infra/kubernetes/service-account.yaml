apiVersion: v1
kind: ServiceAccount
metadata:
  name: ppm-platform-sa
  namespace: ppm-platform
  labels:
    app: ppm-platform
    environment: production
  annotations:
    azure.workload.identity/client-id: ${AZURE_CLIENT_ID}
    azure.workload.identity/tenant-id: ${AZURE_TENANT_ID}
# automounting of service account tokens is disabled via pod spec instead
