  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: otlp
  selector:
    app.kubernetes.io/name: otel-collector
