# Runtime intent-routing config — used exclusively by services/agent-runtime.
#
# Agent IDs here must match AgentSpec.agent_id values registered in runtime.py.
# Agents 013–025 are currently registered with numeric IDs (agent_015, agent_016,
# agent_022, etc.) rather than descriptive names. The canonical design reference
# at ops/config/agents/intent-routing.yaml uses descriptive names; this file uses
# the numeric IDs that the runtime registry actually accepts.
#
# If the runtime is updated to register agents 013–025 with descriptive IDs,
# update this file to match.
version: 1
default_min_confidence: 0.6
fallback_intent: general_query
intents:
  - name: portfolio_query
    description: Portfolio health, initiative mix, or portfolio status queries.
    min_confidence: 0.6
    routes:
      - agent_id: portfolio-strategy-optimization
        action: get_portfolio_status
        dependencies: []
  - name: project_create
    description: Project creation or initiation requests.
    min_confidence: 0.65
    routes:
      - agent_id: project-definition
        action: create_project
        dependencies: []
  - name: schedule_query
    description: Scheduling, timeline, or milestone inquiries.
    min_confidence: 0.6
    routes:
      - agent_id: schedule-planning
        action: get_schedule
        dependencies: []
  - name: financial_query
    description: Budget, cost, or financial performance questions.
    min_confidence: 0.6
    routes:
      - agent_id: financial-management
        action: get_financial_summary
        dependencies: []
  - name: risk_query
    description: Risk, issue, or mitigation analysis requests.
    min_confidence: 0.6
    routes:
      - agent_id: agent_015
        action: get_risk_dashboard
        dependencies: []
  - name: resource_query
    description: Staffing, utilization, or capacity planning requests.
    min_confidence: 0.6
    routes:
      - agent_id: resource-capacity-management
        action: get_resource_pool
        dependencies: []
  - name: demand_intake
    description: Demand intake and new proposal requests.
    min_confidence: 0.6
    routes:
      - agent_id: demand-intake
        action: submit_request
        dependencies: []
  - name: compliance_query
    description: Compliance, audit, or regulatory questions.
    min_confidence: 0.6
    routes:
      - agent_id: agent_016
        action: get_compliance_status
        dependencies: []
  - name: analytics_query
    description: Analytics, insights, reporting, or KPI questions.
    min_confidence: 0.6
    routes:
      - agent_id: agent_022
        action: get_insights
        dependencies: []
  - name: general_query
    description: General inquiry requiring a default response.
    min_confidence: 0.0
    routes: []
