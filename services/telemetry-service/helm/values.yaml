replicaCount: 2

image:
  repository: ghcr.io/georgeprowse91/telemetry-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  AZURE_MONITOR_CONNECTION_STRING: "InstrumentationKey=00000000-0000-0000-0000-000000000000"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://otel-collector:4318/v1/logs"
  JAEGER_COLLECTOR_ENDPOINT: "jaeger-collector:14250"
  LOKI_ENDPOINT: "http://loki:3100/loki/api/v1/push"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 400m
    memory: 512Mi

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  clusterIssuer: "letsencrypt-prod"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: ""


autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
