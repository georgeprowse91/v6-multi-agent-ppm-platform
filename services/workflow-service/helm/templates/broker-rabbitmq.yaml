{{- if .Values.broker.rabbitmq.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}-broker
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "name" . }}
      app.kubernetes.io/component: broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "name" . }}
        app.kubernetes.io/component: broker
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.broker.rabbitmq.image | quote }}
          ports:
            - containerPort: {{ .Values.broker.rabbitmq.port }}
            - containerPort: {{ .Values.broker.rabbitmq.managementPort }}
          resources:
{{ toYaml .Values.broker.rabbitmq.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "name" . }}-broker
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: broker
spec:
  type: ClusterIP
  ports:
    - name: amqp
      port: {{ .Values.broker.rabbitmq.port }}
      targetPort: {{ .Values.broker.rabbitmq.port }}
    - name: management
      port: {{ .Values.broker.rabbitmq.managementPort }}
      targetPort: {{ .Values.broker.rabbitmq.managementPort }}
  selector:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/component: broker
{{- end }}
