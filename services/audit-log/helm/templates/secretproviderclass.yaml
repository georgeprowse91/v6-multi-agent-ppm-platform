apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "name" . }}-kv
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ required "keyVault.clientId is required for audit-log" .Values.keyVault.clientId | quote }}
    keyvaultName: {{ required "keyVault.name is required for audit-log" .Values.keyVault.name | quote }}
    tenantId: {{ required "keyVault.tenantId is required for audit-log" .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.secrets.auditWormConnectionString | quote }}
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secrets.auditLogEncryptionKey | quote }}
          objectType: secret
  secretObjects:
    - secretName: {{ .Values.keyVault.secretName | quote }}
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.secrets.auditWormConnectionString | quote }}
          key: {{ .Values.keyVault.secrets.auditWormConnectionString | quote }}
        - objectName: {{ .Values.keyVault.secrets.auditLogEncryptionKey | quote }}
          key: {{ .Values.keyVault.secrets.auditLogEncryptionKey | quote }}
