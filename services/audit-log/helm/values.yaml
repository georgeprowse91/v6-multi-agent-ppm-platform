replicaCount: 2

image:
  repository: ghcr.io/georgeprowse91/audit-log
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  LOG_LEVEL: info
  AUDIT_WORM_CONTAINER: "audit-events"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
  WEB_CONCURRENCY: "4"
  # SQLAlchemy connection pool tuning for production workloads.
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  DB_POOL_RECYCLE: "1800"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 400m
    memory: 512Mi

keyVault:
  enabled: true
  name: ""
  tenantId: ""
  clientId: ""
  secretName: "ppm-audit-secrets"
  secrets:
    auditWormConnectionString: "audit-worm-connection-string"
    auditLogEncryptionKey: "audit-log-encryption-key"

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  clusterIssuer: "letsencrypt-prod"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: ""


autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
