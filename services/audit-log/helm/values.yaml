replicaCount: 2

image:
  repository: ghcr.io/georgeprowse91/audit-log
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  LOG_LEVEL: info
  AUDIT_WORM_CONTAINER: "audit-events"
  AUDIT_WORM_CONNECTION_STRING: ""
  AUDIT_LOG_ENCRYPTION_KEY: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: ""
