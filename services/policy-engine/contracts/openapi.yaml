openapi: 3.0.3
info:
  title: Policy Engine Service
  version: 1.0.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /policies/evaluate:
    post:
      summary: Evaluate a policy bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyEvaluationRequest"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyEvaluationResponse"
  /rbac/evaluate:
    post:
      summary: Evaluate tenant RBAC decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RBACEvaluationRequest"
      responses:
        "200":
          description: RBAC decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RBACEvaluationResponse"
  /abac/evaluate:
    post:
      summary: Evaluate attribute-based access decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ABACEvaluationRequest"
      responses:
        "200":
          description: ABAC decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ABACEvaluationResponse"
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
      required: [status, service]
    PolicyEvaluationRequest:
      type: object
      properties:
        bundle:
          type: object
          additionalProperties: true
      required: [bundle]
    PolicyEvaluationResponse:
      type: object
      properties:
        decision:
          type: string
        reasons:
          type: array
          items:
            type: string
      required: [decision, reasons]
    RBACEvaluationRequest:
      type: object
      properties:
        tenant_id:
          type: string
        roles:
          type: array
          items:
            type: string
        permission:
          type: string
        classification:
          type: string
      required: [tenant_id, roles, permission]
    RBACEvaluationResponse:
      type: object
      properties:
        decision:
          type: string
        reasons:
          type: array
          items:
            type: string
      required: [decision, reasons]
    ABACEvaluationRequest:
      type: object
      properties:
        tenant_id:
          type: string
        subject:
          type: object
          additionalProperties: true
        action:
          type: string
        resource:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
      required: [tenant_id, subject, action]
    ABACEvaluationResponse:
      type: object
      properties:
        decision:
          type: string
        reasons:
          type: array
          items:
            type: string
      required: [decision, reasons]
