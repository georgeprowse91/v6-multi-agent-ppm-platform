openapi: 3.0.3
info:
  title: Policy Engine Service
  version: 1.0.0
paths:
  /livez:
    get:
      summary: Liveness check
      responses:
        "200":
          description: Service process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Dependencies are operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Readiness degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz/deep:
    get:
      summary: Deep readiness check
      responses:
        "200":
          description: Critical downstream transaction probe succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Deep readiness probe failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /healthz:
    get:
      summary: Backward-compatible readiness alias
      responses:
        "200":
          description: Dependencies are operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Readiness degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/policies/evaluate:
    post:
      summary: Evaluate a policy bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyEvaluationRequest"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyEvaluationResponse"
  /v1/rbac/evaluate:
    post:
      summary: Evaluate tenant RBAC decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RBACEvaluationRequest"
      responses:
        "200":
          description: RBAC decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RBACEvaluationResponse"
  /v1/abac/evaluate:
    post:
      summary: Evaluate attribute-based access decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ABACEvaluationRequest"
      responses:
        "200":
          description: ABAC decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ABACEvaluationResponse"
components:
  schemas:
    HealthCheckDetail:
      type: object
      properties:
        status:
          type: string
        severity:
          type: string
        remediation_hint:
          type: string
        observed_at:
          type: string
          format: date-time
      required: [status, severity, remediation_hint, observed_at]
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/HealthCheckDetail"
        severity:
          type: string
        remediation_hint:
          type: string
        observed_at:
          type: string
          format: date-time
        degraded_since:
          type: string
          nullable: true
          format: date-time
        recovered_at:
          type: string
          nullable: true
          format: date-time
      required: [status, checks, severity, remediation_hint, observed_at]
    PolicyEvaluationRequest:
      type: object
      properties:
        bundle:
          type: object
          additionalProperties: true
      required: [bundle]
    PolicyEvaluationResponse:
      type: object
      properties:
        decision:
          type: string
        reasons:
          type: array
          items:
            type: string
      required: [decision, reasons]
    RBACEvaluationRequest:
      type: object
      properties:
        tenant_id:
          type: string
        roles:
          type: array
          items:
            type: string
        permission:
          type: string
        classification:
          type: string
      required: [tenant_id, roles, permission]
    RBACEvaluationResponse:
      type: object
      properties:
        decision:
          type: string
        reasons:
          type: array
          items:
            type: string
      required: [decision, reasons]
    ABACEvaluationRequest:
      type: object
      properties:
        tenant_id:
          type: string
        subject:
          type: object
          additionalProperties: true
        action:
          type: string
        resource:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
      required: [tenant_id, subject, action]
    ABACEvaluationResponse:
      type: object
      properties:
        decision:
          type: string
        reasons:
          type: array
          items:
            type: string
      required: [decision, reasons]
