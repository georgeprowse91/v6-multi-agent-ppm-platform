      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [core, full]
    ports:
      - "8087:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - AUTH_DEV_MODE=${AUTH_DEV_MODE}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES}
