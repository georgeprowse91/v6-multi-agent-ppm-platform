version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ppm:ppm_password@db:5432/ppm
      - REDIS_URL=redis://redis:6379/0
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src
      - ./apps/orchestration-service/src:/app/apps/orchestration-service/src
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./config:/app/config
    networks:
      - ppm-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ppm
      POSTGRES_USER: ppm
      POSTGRES_PASSWORD: ppm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ppm-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Web UI (optional React/Vue frontend)
  # ui:
  #   build:
  #     context: ./apps/web
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000
  #   depends_on:
  #     - api
  #   networks:
  #     - ppm-network
  #   restart: unless-stopped

  # Streamlit Prototype (for testing/demo)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./apps/web:/app
      - ./docs:/docs:ro
    networks:
      - ppm-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ppm-network:
    driver: bridge
