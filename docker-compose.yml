version: '3.8'

# DEV-ONLY COMPOSE PROFILE
# Do not use local defaults from .env/.env.example in CI or production.
services:
  api:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [demo, core, full]
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENVIRONMENT=${ENVIRONMENT}
      - ORCHESTRATION_STATE_BACKEND=${ORCHESTRATION_STATE_BACKEND}
      - AUTH_DEV_MODE=${AUTH_DEV_MODE}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES}
      - AUTH_DEV_TENANT_ID=${AUTH_DEV_TENANT_ID}
      - DEMO_MODE=${DEMO_MODE}
      - DOCUMENT_SESSION_DB_PATH=${DOCUMENT_SESSION_DB_PATH:-/app/data/documents/sessions.db}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MOCK_RESPONSE_PATH=${LLM_MOCK_RESPONSE_PATH}
      - PYTHONPATH=/app/vendor/stubs:/app/vendor:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      workflow-engine:
        condition: service_healthy
      identity-access:
        condition: service_healthy
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src
      - ./apps/orchestration-service/src:/app/apps/orchestration-service/src
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./ops/config:/app/ops/config
      - ./vendor:/app/vendor
      - ./examples:/app/examples
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  workflow-engine:
    build:
      context: ./apps/workflow-engine
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [demo, core, full]
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - AUTH_DEV_MODE=${AUTH_DEV_MODE}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES}
      - AUTH_DEV_TENANT_ID=${AUTH_DEV_TENANT_ID}
      - DEMO_MODE=${DEMO_MODE}
      - WORKFLOW_DB_PATH=${WORKFLOW_DB_PATH:-/app/apps/workflow-engine/storage/workflows.db}
    volumes:
      - ./apps/workflow-engine:/app/apps/workflow-engine
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  identity-access:
    build:
      context: ./services/identity-access
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [core, full]
    ports:
      - "8081:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - AUTH_DEV_MODE=${AUTH_DEV_MODE}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES}
      - AUTH_DEV_TENANT_ID=${AUTH_DEV_TENANT_ID}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
