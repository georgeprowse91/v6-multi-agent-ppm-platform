version: '3.8'

# DEV-ONLY COMPOSE PROFILE
# Do not use local defaults from .env/.env.example in CI or production.
services:
  # API Service
  api:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENVIRONMENT=${ENVIRONMENT}
      - ORCHESTRATION_STATE_BACKEND=${ORCHESTRATION_STATE_BACKEND}
      - AUTH_DEV_MODE=${AUTH_DEV_MODE}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES}
      - AUTH_DEV_TENANT_ID=${AUTH_DEV_TENANT_ID}
      - DEMO_MODE=${DEMO_MODE}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MOCK_RESPONSE_PATH=${LLM_MOCK_RESPONSE_PATH}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src
      - ./apps/orchestration-service/src:/app/apps/orchestration-service/src
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./config:/app/config
      - ./examples:/app/examples
    networks:
      - ppm-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  workflow-engine:
    build:
      context: ./apps/workflow-engine
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - AUTH_DEV_MODE=${AUTH_DEV_MODE}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES}
      - AUTH_DEV_TENANT_ID=${AUTH_DEV_TENANT_ID}
      - DEMO_MODE=${DEMO_MODE}
      - WORKFLOW_DB_PATH=/app/apps/workflow-engine/storage/workflows.db
    volumes:
      - ./apps/workflow-engine:/app/apps/workflow-engine
    networks:
      - ppm-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ppm-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Web UI (optional React/Vue frontend)
  # ui:
  #   build:
  #     context: ./apps/web
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000
  #   depends_on:
  #     - api
  #   networks:
  #     - ppm-network
  #   restart: unless-stopped

  # Production Web Console
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./apps/web:/app
    environment:
      - API_GATEWAY_URL=${API_GATEWAY_URL}
      - IDENTITY_ACCESS_URL=${IDENTITY_ACCESS_URL}
      - WORKFLOW_ENGINE_URL=${WORKFLOW_ENGINE_URL}
      - DEMO_MODE=${DEMO_MODE}
    depends_on:
      api:
        condition: service_healthy
      workflow-engine:
        condition: service_healthy
    networks:
      - ppm-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ppm-network:
    driver: bridge
