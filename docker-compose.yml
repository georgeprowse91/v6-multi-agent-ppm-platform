version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ppm:ppm_password@db:5432/ppm
      - REDIS_URL=redis://redis:6379/0
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
      - ORCHESTRATION_STATE_BACKEND=db
      - AUTH_DEV_MODE=${AUTH_DEV_MODE:-true}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES:-PMO_ADMIN}
      - AUTH_DEV_TENANT_ID=${AUTH_DEV_TENANT_ID:-dev-tenant}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_MOCK_RESPONSE_PATH=${LLM_MOCK_RESPONSE_PATH:-/app/examples/demo-scenarios/quickstart-llm-response.json}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src
      - ./apps/orchestration-service/src:/app/apps/orchestration-service/src
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./config:/app/config
      - ./examples:/app/examples
    networks:
      - ppm-network
    restart: unless-stopped

  workflow-engine:
    build:
      context: .
      dockerfile: apps/workflow-engine/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - AUTH_DEV_MODE=${AUTH_DEV_MODE:-true}
      - AUTH_DEV_ROLES=${AUTH_DEV_ROLES:-PMO_ADMIN}
      - AUTH_DEV_TENANT_ID=${AUTH_DEV_TENANT_ID:-dev-tenant}
      - WORKFLOW_DB_PATH=/app/apps/workflow-engine/storage/workflows.db
    volumes:
      - ./apps/workflow-engine:/app/apps/workflow-engine
    networks:
      - ppm-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ppm
      POSTGRES_USER: ppm
      POSTGRES_PASSWORD: ppm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ppm-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Web UI (optional React/Vue frontend)
  # ui:
  #   build:
  #     context: ./apps/web
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000
  #   depends_on:
  #     - api
  #   networks:
  #     - ppm-network
  #   restart: unless-stopped

  # Production Web Console
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./apps/web:/app
    environment:
      - API_GATEWAY_URL=http://api:8000
      - IDENTITY_ACCESS_URL=http://identity-access:8080
      - WORKFLOW_ENGINE_URL=http://workflow-engine:8080
    networks:
      - ppm-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ppm-network:
    driver: bridge
