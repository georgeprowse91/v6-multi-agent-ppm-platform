      context: ./services/agent-runtime
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [full]
    ports:
      - "8092:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [full]
    ports:
      - "8093:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - IDENTITY_OIDC_DISCOVERY_URL=${IDENTITY_OIDC_DISCOVERY_URL}
      - IDENTITY_ISSUER=${IDENTITY_ISSUER}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity-access:
        condition: service_healthy
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  realtime-coedit-service:
    build:
      context: ./services/realtime-coedit-service
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [full]
    ports:
      - "8094:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity-access:
        condition: service_healthy
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    profiles: [demo, core, full]
    ports:
      - "8501:8501"
    volumes:
      - ./apps/web:/app
    environment:
      - API_GATEWAY_URL=${API_GATEWAY_URL}
      - IDENTITY_ACCESS_URL=${IDENTITY_ACCESS_URL}
      - WORKFLOW_ENGINE_URL=${WORKFLOW_ENGINE_URL}
      - DEMO_MODE=${DEMO_MODE}
      - DOCUMENT_SESSION_DB_PATH=${DOCUMENT_SESSION_DB_PATH:-/app/data/documents/sessions.db}
    depends_on:
      api:
        condition: service_healthy
      workflow-engine:
        condition: service_healthy
      identity-access:
        condition: service_healthy
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    profiles: [demo, core, full]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ppm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: [demo, core, full]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ppm-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ppm-network:
    driver: bridge
