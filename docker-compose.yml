  telemetry-service:
    build:
      context: ./services/telemetry-service
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [full]
    ports:
      - "8091:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    depends_on:
      db:
        condition: service_healthy
