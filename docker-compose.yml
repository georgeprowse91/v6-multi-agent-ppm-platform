    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  analytics-service:
    build:
      context: ./apps/analytics-service
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: .
    profiles: [full]
    ports:
      - "8086:8080"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DATA_SERVICE_URL=http://data-service:8080
      - DATA_LINEAGE_SERVICE_URL=http://data-lineage-service:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      data-service:
        condition: service_healthy
      data-lineage-service:
        condition: service_healthy
    networks:
